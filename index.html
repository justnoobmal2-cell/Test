<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sootify</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#121212;--s1:#181818;--s2:#282828;--s3:#3e3e3e;--muted:#b3b3b3;--green:#1db954;--green2:#1ed760;--nav-h:60px}
html{height:100%}
body{height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased}

/* SVG 아이콘 공통 */
.ic{display:inline-flex;align-items:center;justify-content:center;fill:currentColor}
.ic svg{display:block}

/* ── 레이아웃 ── */
#nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--s1);border-top:1px solid rgba(255,255,255,.08);display:flex;z-index:200}
#mini{position:fixed;left:8px;right:8px;bottom:calc(var(--nav-h)+4px);background:#1f1f1f;border-radius:10px;overflow:hidden;z-index:190;display:none;cursor:pointer;border:1px solid rgba(255,255,255,.06)}
#mini.on{display:block}
#screens{position:fixed;top:0;left:0;right:0;bottom:var(--nav-h);overflow:hidden;z-index:1}
.screen{position:absolute;inset:0;overflow-y:auto;display:none;padding-bottom:100px;z-index:1}
.screen::-webkit-scrollbar{display:none}
.screen.on{display:block;z-index:2}

/* ── NAV ── */
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:600;transition:color .15s}
.nb.on{color:#fff}
.nb svg{width:22px;height:22px;fill:currentColor}

/* ── 공통 ROW ── */
.row{display:flex;align-items:center;gap:12px;padding:8px 16px;cursor:pointer;transition:background .1s}
.row:active{background:rgba(255,255,255,.05)}
.row.on .rt{color:var(--green)}
.thumb{width:48px;height:48px;background:var(--s2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.ri{flex:1;min-width:0}
.rt{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rs{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.more-btn{background:transparent;border:none;cursor:pointer;color:var(--muted);padding:6px 8px;line-height:1;display:flex}

/* ── HOME ── */
.ph{padding:52px 16px 12px}
.ph h1{font-size:22px;font-weight:700}
.qg{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 24px}
.qi{background:var(--s2);border-radius:6px;height:56px;display:flex;align-items:center;overflow:hidden;cursor:pointer;transition:background .1s}
.qi:active{background:var(--s3)}
.qi.on .qt{color:var(--green)}
.qth{width:56px;height:56px;background:var(--s3);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.qt{font-size:12px;font-weight:700;padding:0 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st{font-size:18px;font-weight:700;padding:0 16px 10px}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 16px;line-height:1.8}

/* ── SEARCH ── */
.sh{padding:52px 16px 10px;position:sticky;top:0;background:var(--bg);z-index:10}
.sh h1{font-size:22px;font-weight:700;margin-bottom:14px}
.sbox{background:#fff;border-radius:6px;padding:0 14px;display:flex;align-items:center;gap:10px;height:46px}
.sbox svg{color:#121212;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2.5}
.sin{flex:1;background:transparent;border:none;outline:none;font-family:'Noto Sans KR',sans-serif;font-size:15px;color:#121212;font-weight:500}
.sin::placeholder{color:#777}
.scl{background:transparent;border:none;cursor:pointer;color:#555;font-size:16px;padding:2px;display:none;line-height:1}
.sbtn{background:var(--green);color:#000;border:none;border-radius:6px;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:13px;padding:0 16px;height:36px;cursor:pointer;margin-top:8px;width:100%}
.sbtn:hover{background:var(--green2)}

/* 검색 결과 */
.yt-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background .1s;border-bottom:1px solid rgba(255,255,255,.04)}
.yt-item:active{background:rgba(255,255,255,.05)}
.yt-thumb{width:80px;height:45px;object-fit:cover;border-radius:4px;background:var(--s2);flex-shrink:0}
.yt-thumb-ph{width:80px;height:45px;background:var(--s2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.yt-info{flex:1;min-width:0}
.yt-title{font-size:13px;font-weight:500;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.yt-meta{font-size:11px;color:var(--muted);margin-top:3px}
.yt-acts{display:flex;gap:6px;flex-shrink:0}
.yt-act{background:var(--s2);border:none;border-radius:6px;cursor:pointer;padding:7px;display:flex;align-items:center;justify-content:center;color:#fff;transition:background .15s}
.yt-act:hover{background:var(--s3)}
.yt-act.g{background:var(--green);color:#000}
.yt-act.g:hover{background:var(--green2)}

.s-loading{text-align:center;color:var(--muted);font-size:13px;padding:32px 16px}
.s-spinner{width:24px;height:24px;border:2px solid var(--s3);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

.s-sec{font-size:12px;font-weight:700;color:var(--muted);padding:14px 16px 6px;text-transform:uppercase;letter-spacing:.5px}

/* ── PLAYLIST ── */
.plh{padding:52px 16px 20px;background:linear-gradient(180deg,#1a3a27 0%,var(--bg) 100%)}
.plh .pli{font-size:54px;margin-bottom:10px;display:flex;align-items:center;color:var(--muted)}
.plh h1{font-size:22px;font-weight:700}
.plh p{font-size:12px;color:var(--muted);margin-top:4px}
.plact{display:flex;align-items:center;gap:16px;margin-top:18px}
.plplay{width:52px;height:52px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#000;transition:transform .1s}
.plplay:hover{transform:scale(1.05);background:var(--green2)}
.plplay svg{width:26px;height:26px;fill:currentColor}
.plshuf{background:transparent;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:color .15s}
.plshuf:hover{color:#fff}
.plshuf svg{width:26px;height:26px;fill:currentColor}

/* ── UPLOAD ── */
.uh{padding:52px 16px 20px}
.uh h1{font-size:22px;font-weight:700}
.uh p{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.7}
.ucard{margin:0 16px;background:var(--s1);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:14px}
.uf{background:var(--s2);border:none;border-radius:8px;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:12px 14px;outline:none;width:100%}
.uf::placeholder{color:var(--muted)}
.uf-ta{resize:none;line-height:1.85;min-height:180px}
.gbtn{border:none;cursor:pointer;border-radius:50px;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:14px;padding:14px;width:100%;transition:all .15s}
.gg{background:var(--green);color:#000}.gg:hover{background:var(--green2)}
.api-r{display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:all .3s}
.dot.r{background:var(--green);box-shadow:0 0 5px rgba(29,185,84,.6)}
.dot.e{background:#e84040}
.atxt{font-size:11px;color:var(--muted)}

/* ── SYNC EDITOR ── */
#synco{position:fixed;inset:0;z-index:300;background:var(--bg);display:none;flex-direction:column}
#synco.on{display:flex}
.sonav{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.soback{background:transparent;border:none;cursor:pointer;color:#fff;line-height:1;padding:4px;display:flex}
.soback svg{width:28px;height:28px;fill:currentColor}
.sonavt{flex:1;font-size:16px;font-weight:700}
.sosave{background:var(--green);color:#000;border:none;border-radius:20px;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:13px;padding:8px 20px;cursor:pointer}
.sopbar{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.soppbtn{width:36px;height:36px;border-radius:50%;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#000;flex-shrink:0}
.soppbtn svg{width:18px;height:18px;fill:currentColor}
.soptime{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
.sotrk{flex:1;height:4px;background:var(--s3);border-radius:2px;cursor:pointer;overflow:hidden}
.sofl{height:100%;background:var(--green);border-radius:2px;width:0%;pointer-events:none}
.solist{flex:1;overflow-y:auto;padding:8px 0}
.solist::-webkit-scrollbar{display:none}
.sopair{display:flex;align-items:flex-start;gap:14px;padding:10px 16px;border-left:3px solid transparent;cursor:pointer;transition:all .15s}
.sopair.cur{border-left-color:var(--green);background:rgba(29,185,84,.05)}
.sopair.syn .sots{color:var(--green)}
.sots{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:42px;padding-top:3px}
.sojp{font-family:'Noto Sans JP',sans-serif;font-size:14px;line-height:1.6}
.sokr{font-size:12px;color:var(--muted);line-height:1.5;margin-top:2px}
.tapw{padding:12px 16px;flex-shrink:0}
.tapbtn{width:100%;padding:18px;border-radius:50px;background:var(--green);color:#000;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:18px;transition:all .1s;user-select:none;-webkit-user-select:none}
.tapbtn:active{transform:scale(.98);background:var(--green2)}
.sofoot{padding:8px 16px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.soprog{font-size:11px;color:var(--muted)}
.undobtn{background:var(--s2);border:none;border-radius:20px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:11px;color:var(--muted);padding:6px 14px}

/* ── MINI PLAYER ── */
.mini-in{display:flex;align-items:center;gap:12px;padding:10px 12px}
.mini-th{width:40px;height:40px;background:var(--s3);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.mini-i{flex:1;min-width:0}
.mini-t{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-s{font-size:11px;color:var(--muted);margin-top:1px}
.mini-btns{display:flex;gap:4px}
.mini-btn{background:transparent;border:none;cursor:pointer;color:#fff;padding:6px;display:flex;align-items:center;justify-content:center}
.mini-btn svg{width:22px;height:22px;fill:currentColor}
.mini-prog{height:2px;background:var(--s3)}
.mini-pf{height:100%;background:var(--green);width:0%;transition:width .1s linear}

/* ── FULL PLAYER ── */
#po{position:fixed;inset:0;z-index:250;background:var(--bg);display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
#po.on{transform:translateY(0)}
.po-hd{display:flex;align-items:center;padding:14px 16px 0;flex-shrink:0}
.po-dn{background:transparent;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex}
.po-dn svg{width:28px;height:28px;fill:currentColor}
.po-hm{flex:1;text-align:center}
.po-hl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.po-ht{font-size:13px;font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.po-ly{flex:1;overflow-y:auto;padding:0 32px;scroll-behavior:smooth}
.po-ly::-webkit-scrollbar{display:none}
.po-sp{height:30vh}
.po-ln{text-align:center;padding:10px 0;transition:all .35s cubic-bezier(.4,0,.2,1)}
.po-jp{font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:300;color:rgba(255,255,255,.2);line-height:1.6;transition:all .35s cubic-bezier(.4,0,.2,1)}
.po-kr{font-size:12px;font-weight:300;color:rgba(255,255,255,.12);line-height:1.5;margin-top:3px;transition:all .35s cubic-bezier(.4,0,.2,1)}
.po-ln.near .po-jp{color:rgba(255,255,255,.4);font-size:17px}
.po-ln.near .po-kr{color:rgba(255,255,255,.25)}
.po-ln.active .po-jp{color:#fff;font-size:22px;font-weight:700}
.po-ln.active .po-kr{color:rgba(255,255,255,.7);font-size:14px}
.po-ct{padding:16px 24px 28px;flex-shrink:0}
.po-sg{font-size:20px;font-weight:700}
.po-ar{font-size:14px;color:var(--muted);margin-top:2px;margin-bottom:18px}
.po-pr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.po-t{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:36px}
.po-trk{flex:1;height:4px;background:var(--s3);border-radius:2px;cursor:pointer}
.po-pf{height:100%;background:#fff;border-radius:2px;width:0%;pointer-events:none;transition:width .1s linear}
.po-bs{display:flex;align-items:center;justify-content:space-between;padding:0 4px}
.po-btn{background:transparent;border:none;cursor:pointer;color:var(--muted);padding:6px;display:flex;align-items:center;justify-content:center;transition:color .15s}
.po-btn:hover{color:#fff}
.po-btn svg{width:30px;height:30px;fill:currentColor}
.po-main{width:60px;height:60px;border-radius:50%;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#000;transition:transform .1s}
.po-main:hover{transform:scale(1.05)}
.po-main svg{width:28px;height:28px;fill:currentColor}
.po-del{display:flex;justify-content:center;margin-top:12px}
.po-delbtn{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:6px 14px;border-radius:20px;transition:color .15s}
.po-delbtn:hover{color:#e84040}

.toast{position:fixed;bottom:calc(var(--nav-h)+70px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--s2);color:#fff;font-size:12px;font-weight:500;padding:10px 20px;border-radius:20px;z-index:999;pointer-events:none;opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#yt{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px}
</style>
</head>
<body>
<div id="yt"></div>

<div id="screens">

  <div class="screen on" id="homeScreen">
    <div class="ph"><h1 id="greet">안녕하세요 👋</h1></div>
    <div class="qg" id="qg"></div>
    <div class="st">저장된 곡</div>
    <div id="homeSongs"></div>
  </div>

  <div class="screen" id="searchScreen">
    <div style="padding:52px 16px 0">
      <h1 style="font-size:22px;font-weight:700;margin-bottom:14px">검색</h1>
      <div style="background:#fff;border-radius:6px;padding:0 14px;display:flex;align-items:center;gap:10px;height:46px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#121212" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="sin" placeholder="YouTube에서 검색" style="flex:1;background:transparent;border:none;outline:none;font-family:'Noto Sans KR',sans-serif;font-size:15px;color:#121212;font-weight:500">
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button id="sbtnEl" style="flex:1;height:46px;border-radius:6px;background:#1db954;color:#000;border:none;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:14px;cursor:pointer;-webkit-appearance:none">검색</button>
        <button id="keyBtnEl" style="width:46px;height:46px;border-radius:6px;background:#282828;color:#b3b3b3;border:none;font-size:18px;cursor:pointer;-webkit-appearance:none">⚙</button>
      </div>
    </div>
    <div id="sres" style="padding-top:8px">
      <div style="font-size:12px;font-weight:700;color:#b3b3b3;padding:14px 16px 6px;text-transform:uppercase;letter-spacing:.5px">내 라이브러리</div>
      <div id="libRows"></div>
    </div>
  </div>

  <div class="screen" id="playlistScreen">
    <div class="plh">
      <div class="pli">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      </div>
      <h1>내 플레이리스트</h1>
      <p id="plmeta">0곡</p>
      <div class="plact">
        <button class="plplay" onclick="playAll()">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="plshuf" id="shufBtn" onclick="playShuffle()">
          <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 8.46 20 10.5V4h-5.5zm.33 9.41-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
      </div>
    </div>
    <div id="plsongs"></div>
  </div>

  <div class="screen" id="uploadScreen">
    <div class="uh"><h1>업로드</h1><p>YouTube URL과 가사를 넣고<br>싱크를 맞춰 저장하세요.</p></div>
    <div class="ucard">
      <input class="uf" id="upUrl" placeholder="YouTube URL">
      <div class="api-r"><div class="dot" id="d2"></div><span class="atxt" id="a2">연결 중...</span></div>
      <textarea class="uf uf-ta" id="upLy" placeholder="가사 (일본어↵한국어↵↵일본어↵한국어...)"></textarea>
      <button class="gbtn gg" onclick="startSync()">싱크 시작 →</button>
    </div>
  </div>
</div>

<div id="synco">
  <div class="sonav">
    <button class="soback" onclick="closeSy()">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <div class="sonavt">Sync Editor</div>
    <button class="sosave" onclick="saveSong()">저장</button>
  </div>
  <div class="sopbar">
    <button class="soppbtn" id="spbtn" onclick="togglePlay()">
      <svg id="spIc" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <div class="soptime"><span id="st">0:00</span> / <span id="sd">0:00</span></div>
    <div class="sotrk" id="sotrk"><div class="sofl" id="sofl"></div></div>
  </div>
  <div class="solist" id="solist"></div>
  <div class="tapw"><button class="tapbtn" onclick="stamp()">tap</button></div>
  <div class="sofoot">
    <div class="soprog" id="soprog">0 / 0 완료</div>
    <button class="undobtn" onclick="undo()">↩ undo</button>
  </div>
</div>

<div id="mini" onclick="openPO()">
  <div class="mini-in">
    <div class="mini-th">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    </div>
    <div class="mini-i">
      <div class="mini-t" id="miniT">—</div>
      <div class="mini-s">Sootify</div>
    </div>
    <div class="mini-btns">
      <button class="mini-btn" id="miniBP" onclick="event.stopPropagation();togglePlay()">
        <svg id="miniIc" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="mini-btn" onclick="event.stopPropagation();nextSong()">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
  </div>
  <div class="mini-prog"><div class="mini-pf" id="miniPF"></div></div>
</div>

<nav id="nav">

  </button>

  </button>

<div id="po">
  <div class="po-hd">
    <button class="po-dn" onclick="closePO()">
      <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
    </button>
    <div class="po-hm">

    <div style="width:36px"></div>
  </div>
  <div class="po-ly" id="poly">
    <div class="po-sp"></div>

        <svg id="poIc" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>

        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>

<div class="toast" id="toast"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
var player=null,pReady=false,playing=false;
var pairs=[],cidx=0,songs=[],csong=-1,poEls=[],raf=null,shuf=false;

var SVG_PLAY='<path d="M8 5v14l11-7z"/>';
var SVG_PAUSE='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

function ld(){try{songs=JSON.parse(localStorage.getItem('sootify_v5')||'[]')}catch(e){songs=[]}}
function sv(){localStorage.setItem('sootify_v5',JSON.stringify(songs))}
ld();

var h=new Date().getHours();
document.getElementById('greet').textContent=h<12?'좋은 아침이에요 ☀':h<18?'안녕하세요 👋':'좋은 밤이에요 🌙';

// ── YT API ──
function onYouTubeIframeAPIReady(){
  setapi('c');
  player=new YT.Player('yt',{height:'1',width:'1',playerVars:{controls:0,autoplay:0,playsinline:1},
    events:{
      onReady:function(){pReady=true;setapi('r')},
      onError:function(){setapi('e')},
      onStateChange:function(e){
        playing=e.data===YT.PlayerState.PLAYING;
        updbtns();
        if(playing)startRaf();else stopRaf();
      }
    }
  });
}

function setapi(s){
  var cls='dot'+(s==='r'?' r':s==='e'?' e':'');
  var txt=s==='r'?'준비됨':s==='e'?'연결 실패':'연결 중...';
  ['d2'].forEach(function(id){var el=document.getElementById(id);if(el)el.className=cls});
  ['a2'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=txt});
}

function vid(url){var m=url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);return m?m[1]:null}

function togglePlay(){
  if(!pReady){toast('연결 중... 잠깐만');return}
  if(playing)player.pauseVideo();else player.playVideo();
}

function updbtns(){
  var d=playing?SVG_PAUSE:SVG_PLAY;
  ['spIc','miniIc','poIc'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.innerHTML=d;
  });
}

document.getElementById('sotrk').addEventListener('click',function(e){seek(e,this)});
document.getElementById('potrk').addEventListener('click',function(e){seek(e,this)});
function seek(e,el){
  if(!pReady)return;
  var r=el.getBoundingClientRect();
  player.seekTo(((e.clientX-r.left)/r.width)*(player.getDuration()||0),true);
}

function startRaf(){stopRaf();function f(){tick();raf=requestAnimationFrame(f)}raf=requestAnimationFrame(f)}
function stopRaf(){if(raf){cancelAnimationFrame(raf);raf=null}}
function tick(){
  if(!pReady||!player.getCurrentTime)return;
  var t=player.getCurrentTime()||0,d=player.getDuration()||1;
  var p=(t/d*100).toFixed(2)+'%';
  document.getElementById('sofl').style.width=p;
  document.getElementById('st').textContent=fmt(t);
  document.getElementById('sd').textContent=fmt(d);
  document.getElementById('miniPF').style.width=p;
  document.getElementById('poPF').style.width=p;
  document.getElementById('poCur').textContent=fmt(t);
  document.getElementById('poDur').textContent=fmt(d);
  if(csong>=0)updLy(t);
}
function fmt(s){s=Math.floor(s);return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60)}

function parseLy(raw){
  var lines=raw.split('\n'),res=[],i=0;
  while(i<lines.length){
    while(i<lines.length&&!lines[i].trim())i++;
    if(i>=lines.length)break;
    var jp=lines[i].trim();i++;
    var nx=(lines[i]||'').trim();
    var kr=(nx&&!/[\u3040-\u30ff\u4e00-\u9fff]/.test(nx))?nx:'';
    if(kr)i++;
    res.push({jp:jp,kr:kr,ts:null});
  }
  return res;
}

// ── YOUTUBE 검색 (Invidious API) ──
function getKey(){return localStorage.getItem('yt_api_key')||''}
function setKey(k){localStorage.setItem('yt_api_key',k)}

function doSearch(){
  var q=document.getElementById('sin').value.trim();
  if(!q){toast('검색어를 입력해줘');return}
  var key=getKey();
  if(!key){
    showKeyPrompt();return;
  }
  document.getElementById('scl').style.display='block';
  document.getElementById('sres').innerHTML='<div class="s-loading"><div class="s-spinner"></div>검색 중...</div>';
  var url='https://www.googleapis.com/youtube/v3/search?part=snippet&q='+encodeURIComponent(q)+'&type=video&maxResults=15&key='+key;
  fetch(url)
    .then(function(r){return r.json()})
    .then(function(data){
      if(data.error){
        if(data.error.code===403||data.error.code===400){
          localStorage.removeItem('yt_api_key');
          document.getElementById('sres').innerHTML='<div class="empty">API 키가 잘못됐어<br>다시 설정해줘</div>';
          setTimeout(showKeyPrompt,1500);
        } else {
          document.getElementById('sres').innerHTML='<div class="empty">검색 실패: '+data.error.message+'</div>';
        }
        return;
      }
      renderSearchResults(data.items||[]);
    })
    .catch(function(){
      document.getElementById('sres').innerHTML='<div class="empty">검색 실패<br>네트워크 상태를 확인해줘</div>';
    });
}

function showKeyPrompt(){
  var cur=getKey();
  var k=prompt('YouTube Data API 키를 입력해줘\n\n발급: console.cloud.google.com\n→ YouTube Data API v3 활성화\n→ 사용자 인증 정보 → API 키',cur||'');
  if(k&&k.trim()){setKey(k.trim());toast('API 키 저장됨 ✓')}
}

function fmtDur(sec){
  if(!sec)return '';
  var m=Math.floor(sec/60),s=sec%60;
  return m+':'+(s<10?'0':'')+s;
}

function renderSearchResults(data){
  if(!data||!data.length){
    document.getElementById('sres').innerHTML='<div class="empty">검색 결과가 없어요</div>';
    return;
  }
  var html='<div class="s-sec">YouTube 검색 결과</div>';
  data.slice(0,15).forEach(function(v){
    var thumb=v.videoThumbnails&&v.videoThumbnails.length?v.videoThumbnails[v.videoThumbnails.length>2?2:0].url:'';
    var dur=fmtDur(v.lengthSeconds);
    // 따옴표 오류 수정 (escape 처리)
    html+='<div class="yt-item">'+
      (thumb?'<img class="yt-thumb" src="'+thumb+'" loading="lazy" onerror="this.style.display=\'none\'">':'<div class="yt-thumb-ph"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>')+
      '<div class="yt-info">'+
        '<div class="yt-title">'+esc(v.title)+'</div>'+
        '<div class="yt-meta">'+esc(v.author)+(dur?' · '+dur:'')+'</div>'+
      '</div>'+
      '<div class="yt-acts">'+
        '<button class="yt-act g" onclick="playYT(\''+v.videoId+'\',\''+esc(v.title).replace(/'/g,"&apos;")+'\')" title="재생">'+
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'+
        '</button>'+
        '<button class="yt-act" onclick="addToSync(\''+v.videoId+'\',\''+esc(v.title).replace(/'/g,"&apos;")+'\')" title="싱크 추가">'+
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>'+
        '</button>'+
      '</div>'+
    '</div>';
  });
  document.getElementById('sres').innerHTML=html;
}

function playYT(videoId,title){
  if(!pReady){toast('연결 중... 잠깐만');return}
  csong=-2;
  player.loadVideoById(videoId);
  player.playVideo();
  document.getElementById('miniT').textContent=title;
  document.getElementById('mini').classList.add('on');
  document.getElementById('poSg').textContent=title;
  document.getElementById('poHT').textContent=title;
  document.getElementById('poln').innerHTML='';
  poEls=[];
  toast('▶ '+title);
}

// 닫히지 않았던 따옴표 에러 수정
function addToSync(videoId,title){
  document.getElementById('upUrl').value='https://youtu.be/' + videoId;
  switchTab('upload');
  toast('"'+title+'" URL 추가됨 — 가사를 넣어줘');
}

function clearS(){
  document.getElementById('sin').value='';
  document.getElementById('scl').style.display='none';
  document.getElementById('sres').innerHTML='<div class="s-sec">내 라이브러리</div><div id="libRows"></div>';
  renderLib();
}

// ── SYNC ──
function startSync(){
  var url=document.getElementById('upUrl').value.trim();
  var raw=document.getElementById('upLy').value.trim();
  if(!url){toast('URL을 넣어줘');return}
  if(!raw){toast('가사를 넣어줘');return}
  var id=vid(url);
  if(!id){toast('유효한 URL이 아니야');return}
  if(!pReady){toast('연결 중... 잠깐만');return}
  pairs=parseLy(raw);
  if(!pairs.length){toast('가사 파싱 실패');return}
  cidx=0;
  player.loadVideoById(id);player.pauseVideo();
  renderSo();
  document.getElementById('synco').classList.add('on');
  toast('tap으로 타임스탬프!');
}
function closeSy(){document.getElementById('synco').classList.remove('on');if(pReady)player.pauseVideo()}
function renderSo(){
  var el=document.getElementById('solist');el.innerHTML='';
  pairs.forEach(function(p,i){
    var d=document.createElement('div');
    d.className='sopair'+(p.ts!==null?' syn':'')+(i===cidx?' cur':'');
    d.id='sp'+i;
    d.innerHTML='<div class="sots">'+(p.ts!==null?fmt(p.ts):'—:——')+'</div><div><div class="sojp">'+esc(p.jp)+'</div>'+(p.kr?'<div class="sokr">'+esc(p.kr)+'</div>':'')+'</div>';
    d.onclick=function(){cidx=i;renderSo()};
    el.appendChild(d);
  });
  var done=pairs.filter(function(p){return p.ts!==null}).length;
  document.getElementById('soprog').textContent=done+' / '+pairs.length+' 완료';
  var cur=document.getElementById('sp'+cidx);
  if(cur)cur.scrollIntoView({block:'center',behavior:'smooth'});
}
function stamp(){
  if(!pairs.length)return;
  pairs[cidx].ts=Math.round((pReady?player.getCurrentTime():0)*10)/10;
  if(cidx<pairs.length-1)cidx++;
  renderSo();
  if(navigator.vibrate)navigator.vibrate(18);
}
function undo(){var p=Math.max(0,cidx-1);pairs[p].ts=null;cidx=p;renderSo();toast('↩ 되돌렸어')}
function saveSong(){
  if(!pairs.filter(function(p){return p.ts!==null}).length){toast('타임스탬프 없어!');return}
  var title=prompt('곡 제목:','')||'제목 없음';
  var url=document.getElementById('upUrl').value.trim();
  songs.push({title:title,url:url,pairs:JSON.parse(JSON.stringify(pairs))});
  sv();renderAll();
  document.getElementById('synco').classList.remove('on');
  toast('"'+title+'" 저장됨 ✓');
}

// ── PLAY ──
function playSong(i){
  if(i<0||i>=songs.length)return;
  csong=i;var s=songs[i];
  var id=vid(s.url);
  if(id&&pReady){player.loadVideoById(id);player.playVideo()}
  document.getElementById('miniT').textContent=s.title;
  document.getElementById('mini').classList.add('on');
  document.getElementById('poSg').textContent=s.title;
  document.getElementById('poHT').textContent=s.title;
  buildPoLines();renderAll();
}
function buildPoLines(){
  var c=document.getElementById('poln');c.innerHTML='';poEls=[];
  if(csong<0)return;
  songs[csong].pairs.forEach(function(p){
    var d=document.createElement('div');d.className='po-ln';
    d.innerHTML='<div class="po-jp">'+esc(p.jp)+'</div>'+(p.kr?'<div class="po-kr">'+esc(p.kr)+'</div>':'');
    c.appendChild(d);poEls.push(d);
  });
}
function updLy(t){
  if(csong<0||!songs[csong])return;
  var pp=songs[csong].pairs,active=-1,i;
  for(i=0;i<pp.length;i++)if(pp[i].ts!==null&&pp[i].ts<=t)active=i;
  poEls.forEach(function(el,i){
    el.classList.remove('active','near');
    if(i===active)el.classList.add('active');
    else if(Math.abs(i-active)<=1)el.classList.add('near');
  });
  if(active>=0&&poEls[active])poEls[active].scrollIntoView({block:'center',behavior:'smooth'});
}
function prevSong(){if(songs.length)playSong((csong-1+songs.length)%songs.length)}
function nextSong(){if(songs.length)playSong(shuf?Math.floor(Math.random()*songs.length):(csong+1)%songs.length)}
function playAll(){if(songs.length)playSong(0)}
function playShuffle(){
  shuf=!shuf;
  var b=document.getElementById('shufBtn');
  b.style.color=shuf?'var(--green)':'var(--muted)';
  if(songs.length)playSong(Math.floor(Math.random()*songs.length));
  toast(shuf?'셔플 켜짐':'셔플 꺼짐');
}
function delCur(){
  if(csong<0||csong>=songs.length)return;
  if(!confirm('"'+songs[csong].title+'" 삭제?'))return;
  songs.splice(csong,1);sv();csong=-1;
  document.getElementById('mini').classList.remove('on');
  if(pReady)player.pauseVideo();
  closePO();renderAll();toast('삭제됨');
}
function openPO(){document.getElementById('po').classList.add('on')}
function closePO(){document.getElementById('po').classList.remove('on')}

// ── RENDER ──
function rowHTML(s,i){
  return '<div class="row'+(i===csong?' on':'')+'" onclick="playSong('+i+')">'+
    '<div class="thumb"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>'+
    '<div class="ri"><div class="rt">'+esc(s.title)+'</div><div class="rs">'+s.pairs.length+'개 라인</div></div>'+
    '<button class="more-btn" onclick="event.stopPropagation();delSong('+i+')"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></button>'+
  '</div>';
}
function delSong(i){
  if(!confirm('"'+songs[i].title+'" 삭제?'))return;
  songs.splice(i,1);
  if(csong===i){csong=-1;document.getElementById('mini').classList.remove('on');if(pReady)player.pauseVideo()}
  else if(csong>i)csong--;
  sv();renderAll();
}
function renderAll(){renderHome();renderLib();renderPL()}
function renderHome(){
  var qg=document.getElementById('qg'),hs=document.getElementById('homeSongs');
  if(!songs.length){qg.innerHTML='';hs.innerHTML='<div class="empty">업로드 탭에서 첫 곡을 추가해봐요</div>';return}
  qg.innerHTML=songs.slice(0,6).map(function(s,i){return '<div class="qi'+(i===csong?' on':'')+'" onclick="playSong('+i+')"><div class="qth"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div><div class="qt">'+esc(s.title)+'</div></div>'}).join('');
  hs.innerHTML=songs.map(rowHTML).join('');
}
function renderLib(){
  var el=document.getElementById('libRows');
  if(!el)return;
  if(!songs.length){el.innerHTML='<div class="empty">저장된 곡이 없어요</div>';return}
  el.innerHTML=songs.map(rowHTML).join('');
}
function renderPL(){
  document.getElementById('plmeta').textContent=songs.length+'곡';
  var el=document.getElementById('plsongs');
  if(!songs.length){el.innerHTML='<div class="empty">업로드 탭에서 곡을 추가하면<br>여기서 볼 수 있어요</div>';return}
  el.innerHTML=songs.map(rowHTML).join('');
}

// ── TABS ──
document.querySelectorAll('.nb').forEach(function(b){b.addEventListener('click',function(){switchTab(b.dataset.t)})});
function switchTab(name){
  document.querySelectorAll('.nb').forEach(function(b){b.classList.toggle('on',b.dataset.t===name)});
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on')});
  document.getElementById(name+'Screen').classList.add('on');
  if(name==='playlist')renderPL();
  if(name==='home')renderHome();
}

// ── KEYBOARD ──
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();stamp()}
  if(e.code==='ArrowLeft'&&pReady)player.seekTo(Math.max(0,(player.getCurrentTime()||0)-3),true);
  if(e.code==='ArrowRight'&&pReady)player.seekTo((player.getCurrentTime()||0)+3,true);
  if((e.ctrlKey||e.metaKey)&&e.code==='KeyZ'){e.preventDefault();undo()}
});

function esc(s){return String(s||'').replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>')}
var toastT;
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove('show')},2200)}

renderAll();

// ── 이벤트 리스너 안전한 연결 ──
document.addEventListener('DOMContentLoaded', function() {
  var sBtn = document.getElementById('sbtnEl');
  if(sBtn) sBtn.addEventListener('click', doSearch);
  
  var kBtn = document.getElementById('keyBtnEl');
  if(kBtn) kBtn.addEventListener('click', showKeyPrompt);
  
  var sIn = document.getElementById('sin');
  if(sIn) {
    sIn.addEventListener('keydown', function(e){
      if(e.key === 'Enter') doSearch();
    });
  }
});
</script>
</body>
</html>
