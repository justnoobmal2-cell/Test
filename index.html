<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LYRIC SYNC PRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* --- 변수 및 기본 스타일 --- */
:root {
  --bg-color: #080809;
  --panel-color: #111113;
  --accent-color: #ffcc00; /* 세련된 골드 */
  --accent-hover: #ffdb4d;
  --text-primary: #f0f0f2;
  --text-secondary: #a0a0a5;
  --border-color: rgba(255, 255, 255, 0.08);
  --glass-color: rgba(20, 20, 22, 0.8);
  --error-color: #ef4444;
  --success-color: #22c55e;
  --font-main: 'Poppins', sans-serif;
  --font-jp: 'Noto Sans JP', sans-serif;
  --font-kr: 'Noto Sans KR', sans-serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background-color: var(--bg-color);
  color: var(--text-primary);
  font-family: var(--font-main);
  font-size: 14px;
  letter-spacing: -0.01em;
}

/* --- 배경 효과 (노이즈 및 글로우) --- */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
}

.ambient-glow {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
  opacity: 0.15;
}
.glow-1 { width: 500px; height: 500px; background-color: var(--accent-color); top: -150px; left: -150px; }
.glow-2 { width: 400px; height: 400px; background-color: #3b82f6; bottom: -100px; right: -100px; }

/* --- 레이아웃 --- */
#app {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* --- 헤더 및 네비게이션 --- */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background-color: var(--glass-color);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.app-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.03em;
}
.app-title span { color: var(--accent-color); }

.nav-tabs {
  display: flex;
  gap: 4px;
  background-color: rgba(0, 0, 0, 0.2);
  padding: 4px;
  border-radius: 12px;
  border: 1px solid var(--border-color);
}

.tab-btn {
  border: none;
  background: transparent;
  cursor: pointer;
  color: var(--text-secondary);
  font-family: var(--font-main);
  font-size: 12px;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 9px;
  transition: all 0.2s ease;
}
.tab-btn:hover { color: var(--text-primary); }
.tab-btn.on {
  background-color: var(--panel-color);
  color: var(--accent-color);
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
}

/* --- 메인 콘텐츠 화면 --- */
.screen {
  display: none;
  flex: 1;
  flex-direction: column;
  overflow: hidden;
  padding: 24px;
}
.screen.on { display: flex; }

/* --- 공통 버튼 및 입력창 스타일 --- */
.input-field {
  background-color: var(--panel-color);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  font-family: var(--font-main);
  border-radius: 12px;
  padding: 12px 16px;
  outline: none;
  transition: border-color 0.2s ease;
}
.input-field:focus { border-color: rgba(255, 204, 0, 0.4); }

.btn {
  border: none;
  cursor: pointer;
  font-family: var(--font-main);
  font-weight: 600;
  border-radius: 12px;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn:active { transform: scale(0.98); }

.btn-primary {
  background-color: var(--accent-color);
  color: #000;
}
.btn-primary:hover { background-color: var(--accent-hover); }

.btn-secondary {
  background-color: var(--panel-color);
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
}
.btn-secondary:hover {
  background-color: rgba(255, 255, 255, 0.03);
  color: var(--text-primary);
}

.btn-text {
  background: transparent;
  color: var(--text-secondary);
  font-size: 12px;
  padding: 4px 8px;
}
.btn-text:hover { color: var(--text-primary); }

/* --- SYNC SCREEN (입력 화면) --- */
#syncInput {
  display: flex;
  flex-direction: column;
  gap: 24px;
  height: 100%;
}

.url-section, .lyrics-section {
  background-color: var(--panel-color);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.url-input-group {
  display: flex;
  gap: 12px;
}
.url-input-group .input-field { flex: 1; }
.url-input-group .btn { padding: 0 24px; }

.api-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-secondary);
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background-color: var(--text-secondary);
  transition: background-color 0.3s ease, box-shadow 0.3s ease;
}
.status-dot.ready {
  background-color: var(--success-color);
  box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
}
.status-dot.error {
  background-color: var(--error-color);
  box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
}

.lyrics-textarea {
  flex: 1;
  resize: none;
  line-height: 1.8;
  font-size: 13px;
}

/* --- EDITOR SCREEN (싱크 에디터) --- */
#syncEditor {
  display: none;
  flex-direction: column;
  height: 100%;
}
#syncEditor.on { display: flex; }

.editor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border-color);
  margin-bottom: 16px;
}
.editor-title {
  font-size: 16px;
  font-weight: 600;
}
.editor-actions {
  display: flex;
  gap: 8px;
}

.player-controls {
  background-color: var(--panel-color);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}

.play-pause-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  font-size: 16px;
}

.time-display {
  font-family: var(--font-main);
  font-size: 12px;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}

.progress-bar-container {
  flex: 1;
  height: 6px;
  background-color: rgba(255, 255, 255, 0.05);
  border-radius: 3px;
  position: relative;
  cursor: pointer;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background-color: var(--accent-color);
  width: 0%;
  border-radius: 3px;
  transition: width 0.1s linear;
}

.lyrics-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding-right: 8px; /* 스크롤바 공간 */
}
/* 스크롤바 스타일 */
.lyrics-list::-webkit-scrollbar { width: 4px; }
.lyrics-list::-webkit-scrollbar-track { background: transparent; }
.lyrics-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

.lyric-pair {
  background-color: rgba(255, 255, 255, 0.01);
  border: 1px solid transparent;
  border-radius: 12px;
  padding: 12px 16px;
  display: flex;
  align-items: flex-start;
  gap: 16px;
  transition: all 0.2s ease;
}
.lyric-pair:hover {
  background-color: rgba(255, 255, 255, 0.03);
}
.lyric-pair.current {
  background-color: rgba(255, 204, 0, 0.05);
  border-color: rgba(255, 204, 0, 0.2);
}

.timestamp {
  font-family: var(--font-main);
  font-size: 11px;
  color: var(--text-secondary);
  width: 45px;
  text-align: right;
  font-variant-numeric: tabular-nums;
  padding-top: 2px;
}
.lyric-pair.current .timestamp { color: var(--accent-color); font-weight: 600; }

.lyric-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.lyric-jp {
  font-family: var(--font-jp);
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.6;
}
.lyric-kr {
  font-family: var(--font-kr);
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
}

.tap-section {
  padding-top: 20px;
  margin-top: auto;
}
.tap-btn {
  width: 100%;
  padding: 20px;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  box-shadow: 0 4px 12px rgba(255, 204, 0, 0.3);
}

.editor-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 4px;
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-secondary);
}

/* --- 토스트 알림 --- */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background-color: var(--panel-color);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
  padding: 12px 24px;
  border-radius: 20px;
  font-weight: 500;
  font-size: 13px;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
  z-index: 1000;
  opacity: 0;
  transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55), opacity 0.3s ease;
  pointer-events: none;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* --- 유튜브 플레이어 (숨김) --- */
#yt-player-container {
  position: fixed;
  top: -9999px;
  left: -9999px;
  width: 1px;
  height: 1px;
  overflow: hidden;
}
</style>
</head>
<body>

<div class="ambient-glow glow-1"></div>
<div class="ambient-glow glow-2"></div>

<div id="yt-player-container">
  <div id="yt-player"></div>
</div>

<div id="app">
  <header>
    <div class="app-title">LYRIC <span>SYNC</span> PRO</div>
    <nav class="nav-tabs">
      <button class="tab-btn on" data-tab="sync">SYNC</button>
      <button class="tab-btn" data-tab="play">PLAY</button>
      <button class="tab-btn" data-tab="lib">LIBRARY</button>
    </nav>
  </header>

  <main class="screen on" id="syncScreen">
    <div id="syncInput">
      <section class="url-section">
        <div class="section-header">
          <h2 class="section-title">YouTube Video</h2>
          <div class="api-status">
            <div class="status-dot" id="apiDot"></div>
            <span id="apiStatus">Connecting...</span>
          </div>
        </div>
        <div class="url-input-group">
          <input type="text" class="input-field" id="urlIn" placeholder="Paste YouTube URL here...">
          <button class="btn btn-primary" id="loadBtn" onclick="loadVideo()">LOAD</button>
        </div>
      </section>

      <section class="lyrics-section">
        <div class="section-header">
          <h2 class="section-title">Lyrics</h2>
          <span style="font-size:11px; color:var(--text-secondary);">Format: JP line ↵ KR line ↵↵ ...</span>
        </div>
        <textarea class="input-field lyrics-textarea" id="lyricsIn" placeholder="神戸　中央区　元町。　駅前&#10;고베 주오 구 모토마치 역 앞&#10;&#10;..."></textarea>
        <button class="btn btn-primary start-btn" onclick="startSync()">START SYNC →</button>
      </section>
    </div>

    <div id="syncEditor">
      <div class="editor-header">
        <h1 class="editor-title">Sync Editor</h1>
        <div class="editor-actions">
          <button class="btn btn-secondary btn-small" onclick="backToInput()">CANCEL</button>
          <button class="btn btn-primary btn-small" onclick="saveSong()">SAVE</button>
        </div>
      </div>

      <div class="player-controls">
        <button class="btn btn-primary play-pause-btn" id="sePlayBtn" onclick="togglePlay()">▶</button>
        <div class="time-display">
          <span id="seTime">0:00</span> / <span id="seDur">0:00</span>
        </div>
        <div class="progress-bar-container" id="seTrack">
          <div class="progress-bar-fill" id="seFill"></div>
        </div>
      </div>

      <div class="lyrics-list" id="seLines">
        </div>

      <div class="tap-section">
        <button class="btn btn-primary tap-btn" onclick="stampCurrent()">TAP</button>
        <div class="editor-footer">
          <span class="progress-text" id="seProg">0 / 0 lines synced</span>
          <button class="btn-text" onclick="undoLast()">UNDO LAST (Ctrl+Z) ↩</button>
        </div>
      </div>
    </div>
  </main>

  <main class="screen" id="playScreen">
    <div style="text-align:center; color:var(--text-secondary); margin-top:100px;">Play Screen (Coming Soon)</div>
  </main>

  <main class="screen" id="libScreen">
    <div style="text-align:center; color:var(--text-secondary); margin-top:100px;">Library Screen (Coming Soon)</div>
  </main>
</div>

<div class="toast" id="toast">Message</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player, playerReady = false, isPlaying = false, syncPairs = [], curIdx = 0, rafId = null;

// 유튜브 API 초기화
function onYouTubeIframeAPIReady() {
  player = new YT.Player('yt-player', {
    height: '0',
    width: '0',
    playerVars: {
      'controls': 0,
      'modestbranding': 1,
      'rel': 0,
      'showinfo': 0
    },
    events: {
      'onReady': onPlayerReady,
      'onStateChange': onPlayerStateChange,
      'onError': onPlayerError
    }
  });
}

function onPlayerReady(event) {
  playerReady = true;
  document.getElementById('apiDot').classList.add('ready');
  document.getElementById('apiStatus').textContent = 'Ready';
  document.getElementById('apiStatus').style.color = 'var(--success-color)';
}

function onPlayerStateChange(event) {
  isPlaying = (event.data === YT.PlayerState.PLAYING);
  updatePlayBtns();
  if (isPlaying) {
    startRAF();
  } else {
    stopRAF();
  }
}

function onPlayerError(event) {
  document.getElementById('apiDot').classList.remove('ready');
  document.getElementById('apiDot').classList.add('error');
  document.getElementById('apiStatus').textContent = 'Error';
  document.getElementById('apiStatus').style.color = 'var(--error-color)';
  toast('Error loading video.');
}

// 비디오 로드
function loadVideo() {
  if (!playerReady) return toast('YouTube API is not ready.');
  const url = document.getElementById('urlIn').value.trim();
  const videoId = extractVideoId(url);
  if (videoId) {
    player.loadVideoById(videoId);
    player.pauseVideo();
    toast('Video loaded successfully.');
  } else {
    toast('Invalid YouTube URL.');
  }
}

function extractVideoId(url) {
  const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
  const match = url.match(regExp);
  return (match && match[7].length === 11) ? match[7] : false;
}

// 싱크 시작
function startSync() {
  if (!playerReady || !player.getVideoData().video_id) return toast('Load a video first.');
  const rawLyrics = document.getElementById('lyricsIn').value.trim();
  if (!rawLyrics) return toast('Enter lyrics first.');

  parseLyrics(rawLyrics);
  if (syncPairs.length === 0) return toast('Invalid lyrics format.');

  curIdx = 0;
  renderEditor();
  document.getElementById('syncInput').style.display = 'none';
  document.getElementById('syncEditor').classList.add('on');
}

// 가사 파싱
function parseLyrics(raw) {
  syncPairs = [];
  const blocks = raw.split('\n\n');
  blocks.forEach(block => {
    const lines = block.split('\n').map(line => line.trim()).filter(line => line !== '');
    if (lines.length >= 1) {
      syncPairs.push({
        jp: lines[0],
        kr: lines[1] || '',
        ts: null
      });
    }
  });
}

// 에디터 렌더링
function renderEditor() {
  const container = document.getElementById('seLines');
  container.innerHTML = '';
  syncPairs.forEach((pair, i) => {
    const lyricPair = document.createElement('div');
    lyricPair.className = `lyric-pair ${i === curIdx ? 'current' : ''}`;
    lyricPair.id = `line-${i}`;

    const timestamp = document.createElement('div');
    timestamp.className = 'timestamp';
    timestamp.textContent = pair.ts ? fmt(pair.ts) : '--:--';
    lyricPair.appendChild(timestamp);

    const content = document.createElement('div');
    content.className = 'lyric-content';

    const jp = document.createElement('div');
    jp.className = 'lyric-jp';
    jp.textContent = pair.jp;
    content.appendChild(jp);

    if (pair.kr) {
      const kr = document.createElement('div');
      kr.className = 'lyric-kr';
      kr.textContent = pair.kr;
      content.appendChild(kr);
    }

    lyricPair.appendChild(content);
    container.appendChild(lyricPair);
  });

  updateProgress();
  scrollToCurrent();
}

// 타임스탬프 기록
function stampCurrent() {
  if (curIdx >= syncPairs.length || !isPlaying) return;
  syncPairs[curIdx].ts = player.getCurrentTime();
  curIdx++;
  renderEditor();
}

// Undo
function undoLast() {
  if (curIdx > 0) {
    curIdx--;
    syncPairs[curIdx].ts = null;
    renderEditor();
  }
}

// 재생/일시정지
function togglePlay() {
  if (!playerReady) return;
  if (isPlaying) {
    player.pauseVideo();
  } else {
    player.playVideo();
  }
}

function updatePlayBtns() {
  document.getElementById('sePlayBtn').textContent = isPlaying ? '⏸' : '▶';
}

// 프로그레스 바 업데이트 (RAF)
function startRAF() {
  if (rafId) stopRAF();
  function loop() {
    tick();
    rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);
}

function stopRAF() {
  if (rafId) {
    cancelAnimationFrame(rafId);
    rafId = null;
  }
}

function tick() {
  if (!player Ready) return;
  const currentTime = player.getCurrentTime();
  const duration = player.getDuration();
  if (duration > 0) {
    const progress = (currentTime / duration) * 100;
    document.getElementById('seFill').style.width = `${progress}%`;
    document.getElementById('seTime').textContent = fmt(currentTime);
    document.getElementById('seDur').textContent = fmt(duration);
  }
}

// 프로그레스 바 클릭 이벤트
document.getElementById('seTrack').addEventListener('click', function(e) {
  if (!playerReady) return;
  const rect = this.getBoundingClientRect();
  const pos = (e.clientX - rect.left) / rect.width;
  const duration = player.getDuration();
  if (duration > 0) {
    player.seekTo(pos * duration, true);
  }
});

// 유틸리티 함수
function fmt(seconds) {
  const min = Math.floor(seconds / 60);
  const sec = Math.floor(seconds % 60);
  return `${min}:${sec.toString().padStart(2, '0')}`;
}

function updateProgress() {
  document.getElementById('seProg').textContent = `${curIdx} / ${syncPairs.length} lines synced`;
}

function scrollToCurrent() {
  const currentLine = document.getElementById(`line-${curIdx}`);
  if (currentLine) {
    currentLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function backToInput() {
  document.getElementById('syncEditor').classList.remove('on');
  document.getElementById('syncInput').style.display = 'flex';
  stopRAF();
  player.pauseVideo();
}

function saveSong() {
  toast('Save function is not implemented yet.');
}

// 토스트 메시지
let toastTimer;
function toast(message) {
  const toastEl = document.getElementById('toast');
  toastEl.textContent = message;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toastEl.classList.remove('show');
  }, 3000);
}

// 키보드 단축키
document.addEventListener('keydown', e => {
  // 입력창에 포커스가 있을 때는 단축키 작동 방지
  if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;

  if (e.code === 'Space') {
    e.preventDefault();
    togglePlay();
  } else if (e.code === 'Enter' || e.code === 'NumpadEnter') {
    e.preventDefault();
    if (document.getElementById('syncEditor').classList.contains('on')) {
      stampCurrent();
    }
  } else if ((e.ctrlKey || e.metaKey) && e.code === 'KeyZ') {
    e.preventDefault();
    if (document.getElementById('syncEditor').classList.contains('on')) {
      undoLast();
    }
  }
});

// 탭 전환
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
    document.getElementById(`${btn.dataset.tab}Screen`).classList.add('on');
  });
});

</script>
</body>
</html>
