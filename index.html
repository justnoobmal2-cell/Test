<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LYRIC SYNC</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #c8f542;
    --accent2: #f5427b;
    --text: #f0f0f0;
    --text-dim: #555;
    --text-mid: #999;
    --active-lyric: #c8f542;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 4px;
    color: var(--accent);
  }
  .mode-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-radius: 8px;
    padding: 4px;
  }
  .mode-tab {
    padding: 6px 16px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-mid);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
  }
  .mode-tab.active {
    background: var(--accent);
    color: #000;
    font-weight: 700;
  }

  /* ── MAIN LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 61px);
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    padding: 14px 20px 8px;
    text-transform: uppercase;
  }

  /* URL 입력 */
  .url-area {
    padding: 0 16px 12px;
  }
  .input-row {
    display: flex;
    gap: 8px;
  }
  .url-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 10px 12px;
    outline: none;
    transition: border-color .2s;
  }
  .url-input:focus { border-color: var(--accent); }
  .url-input::placeholder { color: var(--text-dim); }

  .btn {
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 10px 14px;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn-accent { background: var(--accent); color: #000; }
  .btn-accent:hover { background: #deff55; }
  .btn-ghost { background: var(--surface2); color: var(--text-mid); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: #444; }
  .btn-danger { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); }
  .btn-danger:hover { background: var(--accent2); color: #fff; }

  /* 가사 입력 */
  .lyrics-area {
    padding: 0 16px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .lyrics-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    line-height: 1.8;
    padding: 12px;
    resize: none;
    outline: none;
    min-height: 0;
    transition: border-color .2s;
  }
  .lyrics-input:focus { border-color: var(--accent); }
  .lyrics-input::placeholder { color: var(--text-dim); }

  .btn-full {
    width: 100%;
    margin-top: 8px;
    padding: 12px;
    font-size: 12px;
    letter-spacing: 1px;
  }

  /* 저장된 곡 목록 */
  .song-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 12px;
  }
  .song-list::-webkit-scrollbar { width: 4px; }
  .song-list::-webkit-scrollbar-track { background: transparent; }
  .song-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .song-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s;
    border: 1px solid transparent;
  }
  .song-item:hover { background: var(--surface2); }
  .song-item.active { background: var(--surface2); border-color: var(--accent); }
  .song-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    min-width: 20px;
  }
  .song-info { flex: 1; min-width: 0; }
  .song-title {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .song-lines {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .song-del {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color .15s;
  }
  .song-del:hover { color: var(--accent2); }

  .empty-msg {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    padding: 30px 0;
    line-height: 2;
  }

  /* ── RIGHT PANEL ── */
  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* SYNC MODE */
  #syncMode, #playMode { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  #syncMode.visible, #playMode.visible { display: flex; }

  /* 싱크 에디터 */
  .sync-header {
    padding: 20px 28px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .sync-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
  }
  .sync-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }
  .sync-hint span {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    color: var(--accent);
    margin: 0 2px;
  }

  .sync-controls {
    padding: 12px 28px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .time-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    min-width: 70px;
  }
  .progress-bar-wrap {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    width: 0%;
    transition: width .1s linear;
  }

  .sync-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 28px;
  }
  .sync-list::-webkit-scrollbar { width: 4px; }
  .sync-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .sync-line {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: all .15s;
    cursor: pointer;
  }
  .sync-line:hover { background: var(--surface2); }
  .sync-line.current {
    background: var(--surface2);
    border-color: var(--accent);
  }
  .sync-line.synced .sync-ts { color: var(--accent); }

  .sync-ts {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    min-width: 55px;
  }
  .sync-text {
    font-size: 14px;
    flex: 1;
  }
  .sync-clear-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color .15s;
    opacity: 0;
  }
  .sync-line:hover .sync-clear-btn { opacity: 1; }
  .sync-clear-btn:hover { color: var(--accent2); }

  .sync-footer {
    padding: 12px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .sync-progress-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-mid);
    flex: 1;
  }

  /* PLAY MODE */
  .play-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(200,245,66,.04) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(245,66,123,.03) 0%, transparent 60%);
    pointer-events: none;
  }
  .play-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .play-lyrics-wrap {
    flex: 1;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .play-lyrics-scroll {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    padding: 40px 60px;
    scroll-behavior: smooth;
  }
  .play-lyrics-scroll::-webkit-scrollbar { display: none; }

  .play-lyric-line {
    text-align: center;
    padding: 10px 0;
    font-size: 22px;
    font-weight: 300;
    color: var(--text-dim);
    transition: all .4s ease;
    line-height: 1.6;
    cursor: default;
  }
  .play-lyric-line.active {
    color: var(--active-lyric);
    font-size: 28px;
    font-weight: 700;
    text-shadow: 0 0 30px rgba(200,245,66,.4);
  }
  .play-lyric-line.near {
    color: var(--text-mid);
    font-size: 24px;
  }

  .play-spacer { height: 40vh; }

  .play-controls {
    padding: 20px 40px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .play-now {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }
  .play-now-title {
    color: var(--text-mid);
    font-weight: 700;
  }
  .play-progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .play-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    min-width: 40px;
  }
  .play-progress {
    flex: 1;
    height: 3px;
    background: var(--surface2);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
  }
  .play-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    width: 0%;
    transition: width .1s linear;
  }
  .play-btns {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .play-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-mid);
    font-size: 20px;
    transition: color .15s;
    padding: 6px;
  }
  .play-btn:hover { color: var(--text); }
  .play-btn.main {
    background: var(--accent);
    color: #000;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .play-btn.main:hover { background: #deff55; }

  /* 빈 상태 */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    gap: 12px;
  }
  .empty-state-icon {
    font-size: 48px;
    opacity: .3;
  }
  .empty-state-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
  }

  /* 유튜브 숨김 */
  #yt-player { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #000;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 8px;
    transition: transform .3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* 반응형 */
  @media (max-width: 700px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .left-panel { max-height: 280px; border-right: none; border-bottom: 1px solid var(--border); }
    .play-lyric-line { font-size: 16px; }
    .play-lyric-line.active { font-size: 20px; }
  }
</style>
</head>
<body>

<div id="yt-player"></div>

<header>
  <div class="logo">LYRIC SYNC</div>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setTab('sync')">SYNC</button>
    <button class="mode-tab" onclick="setTab('play')">PLAY</button>
    <button class="mode-tab" onclick="setTab('library')">LIBRARY</button>
  </div>
</header>

<div class="app">

  <!-- LEFT -->
  <div class="left-panel" id="leftPanel">

    <!-- SYNC/PLAY 탭: URL + 가사 입력 -->
    <div id="inputSection">
      <div class="section-label">YouTube URL</div>
      <div class="url-area">
        <div class="input-row">
          <input class="url-input" id="urlInput" placeholder="https://youtu.be/..." />
          <button class="btn btn-accent" id="loadBtn" onclick="loadVideo()">LOAD</button>
        </div>
      </div>

      <div class="section-label">가사 붙여넣기</div>
      <div class="lyrics-area">
        <textarea class="lyrics-input" id="lyricsInput" placeholder="가사를 줄바꿈으로 입력하세요..."></textarea>
        <button class="btn btn-accent btn-full" onclick="startSync()">싱크 시작 →</button>
      </div>
    </div>

    <!-- LIBRARY 탭: 저장된 목록 -->
    <div id="librarySection" style="display:none; flex:1; overflow:hidden; flex-direction:column;">
      <div class="section-label">저장된 곡</div>
      <div class="song-list" id="songList"></div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right-panel">

    <!-- SYNC MODE -->
    <div id="syncMode">
      <div class="sync-header">
        <div>
          <div class="sync-title">SYNC EDITOR</div>
          <div class="sync-hint">재생 후 <span>SPACE</span> 눌러 타임스탬프 기록</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost" onclick="resetSync()">리셋</button>
          <button class="btn btn-accent" onclick="saveSong()">저장</button>
        </div>
      </div>

      <div class="sync-controls">
        <button class="btn btn-accent" id="syncPlayBtn" onclick="togglePlay()" style="padding:8px 16px;">▶</button>
        <div class="time-display" id="syncTime">0:00</div>
        <div class="progress-bar-wrap" onclick="seekFromBar(event, this)">
          <div class="progress-bar-fill" id="syncProgress"></div>
        </div>
      </div>

      <div class="sync-list" id="syncList"></div>

      <div class="sync-footer">
        <div class="sync-progress-text" id="syncProgressText">0 / 0 라인 완료</div>
        <button class="btn btn-ghost" style="font-size:11px;padding:6px 12px;" onclick="undoLast()">↩ UNDO</button>
      </div>
    </div>

    <!-- PLAY MODE -->
    <div id="playMode">
      <div class="play-bg"></div>
      <div class="play-content">
        <div class="play-lyrics-wrap">
          <div class="play-lyrics-scroll" id="playLyricsScroll">
            <div class="play-spacer"></div>
            <div id="playLyrics"></div>
            <div class="play-spacer"></div>
          </div>
        </div>
        <div class="play-controls">
          <div class="play-now">NOW PLAYING — <span class="play-now-title" id="playNowTitle">—</span></div>
          <div class="play-progress-row">
            <div class="play-time" id="playTimeCur">0:00</div>
            <div class="play-progress" onclick="seekFromBar(event, this)">
              <div class="play-progress-fill" id="playProgressFill"></div>
            </div>
            <div class="play-time" id="playTimeDur">0:00</div>
          </div>
          <div class="play-btns">
            <button class="play-btn" onclick="prevSong()">⏮</button>
            <button class="play-btn main" id="playBtn" onclick="togglePlay()">▶</button>
            <button class="play-btn" onclick="nextSong()">⏭</button>
          </div>
        </div>
      </div>

      <!-- 빈 상태 -->
      <div class="empty-state" id="playEmpty">
        <div class="empty-state-icon">♪</div>
        <div class="empty-state-text">LIBRARY에서 곡을 선택하세요</div>
      </div>
    </div>

    <!-- 기본 빈 상태 -->
    <div class="empty-state" id="emptyState" style="flex:1;">
      <div class="empty-state-icon">⌨</div>
      <div class="empty-state-text">URL과 가사를 입력하고 SYNC 시작</div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ── STATE ──
let player = null;
let playerReady = false;
let isPlaying = false;
let syncLines = [];   // { text, ts: null | seconds }
let currentSyncIdx = 0;
let songs = [];       // { title, url, lines: [{text, ts}] }
let currentSongIdx = -1;
let currentTab = 'sync';
let rafId = null;
let playLyricEls = [];

// ── LOCALSTORAGE ──
function loadSongs() {
  try { songs = JSON.parse(localStorage.getItem('lsync_songs') || '[]'); } catch { songs = []; }
}
function saveSongs() {
  localStorage.setItem('lsync_songs', JSON.stringify(songs));
}
loadSongs();

// ── API STATUS ──
function setApiStatus(state) {
  const btn = document.getElementById('loadBtn');
  if (!btn) return;
  if (state === 'connecting') { btn.textContent = '연결중'; btn.style.opacity = '0.5'; }
  if (state === 'ready') { btn.textContent = 'LOAD'; btn.style.opacity = '1'; showToast('유튜브 API 준비됨 ✓'); }
}

// ── YOUTUBE ──
function onYouTubeIframeAPIReady() {
  setApiStatus('connecting');
  player = new YT.Player('yt-player', {
    height: '1', width: '1',
    playerVars: { controls: 0, autoplay: 0 },
    events: {
      onReady: () => { playerReady = true; setApiStatus('ready'); },
      onStateChange: (e) => {
        isPlaying = e.data === YT.PlayerState.PLAYING;
        updatePlayBtns();
        if (isPlaying) startRAF();
        else stopRAF();
      }
    }
  });
}

function loadVideo() {
  const url = document.getElementById('urlInput').value.trim();
  const id = extractVideoId(url);
  if (!id) { showToast('유효한 유튜브 URL을 입력해주세요'); return; }
  if (!playerReady) {
    showToast('API 초기화 중... 재시도 중');
    // 최대 5초 대기 후 재시도
    let tries = 0;
    const wait = setInterval(() => {
      tries++;
      if (playerReady) {
        clearInterval(wait);
        player.loadVideoById(id);
        player.pauseVideo();
        showToast('영상 로드됨 ✓');
      } else if (tries > 10) {
        clearInterval(wait);
        showToast('유튜브 API 연결 실패 — 새로고침 해봐');
      }
    }, 500);
    return;
  }
  player.loadVideoById(id);
  player.pauseVideo();
  showToast('영상 로드됨 ✓');
}

function extractVideoId(url) {
  const m = url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

function togglePlay() {
  if (!playerReady) { showToast('먼저 URL을 로드해주세요'); return; }
  if (isPlaying) player.pauseVideo();
  else player.playVideo();
}

function updatePlayBtns() {
  document.getElementById('syncPlayBtn').textContent = isPlaying ? '⏸' : '▶';
  document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
}

function seekFromBar(e, bar) {
  if (!playerReady) return;
  const rect = bar.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const dur = player.getDuration() || 0;
  player.seekTo(ratio * dur, true);
}

// ── RAF LOOP ──
function startRAF() {
  stopRAF();
  function loop() {
    updateProgress();
    rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);
}
function stopRAF() { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }

function updateProgress() {
  if (!playerReady || !player.getCurrentTime) return;
  const t = player.getCurrentTime() || 0;
  const d = player.getDuration() || 1;
  const pct = (t / d * 100).toFixed(2) + '%';

  document.getElementById('syncProgress').style.width = pct;
  document.getElementById('syncTime').textContent = fmtTime(t);

  document.getElementById('playProgressFill').style.width = pct;
  document.getElementById('playTimeCur').textContent = fmtTime(t);
  document.getElementById('playTimeDur').textContent = fmtTime(d);

  // 싱크 에디터: 현재 라인 하이라이트
  if (currentTab === 'sync') {
    syncLines.forEach((l, i) => {
      const el = document.getElementById('sl-' + i);
      if (!el) return;
      el.classList.toggle('current', i === currentSyncIdx);
    });
  }

  // 플레이 모드: 가사 하이라이트
  if (currentTab === 'play' && currentSongIdx >= 0) {
    updatePlayLyrics(t);
  }
}

function fmtTime(s) {
  s = Math.floor(s);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

// ── SYNC ──
function startSync() {
  const raw = document.getElementById('lyricsInput').value.trim();
  if (!raw) { showToast('가사를 입력해주세요'); return; }
  const url = document.getElementById('urlInput').value.trim();
  if (!extractVideoId(url)) { showToast('URL을 먼저 로드해주세요'); return; }

  syncLines = raw.split('\n').map(t => ({ text: t, ts: null }));
  currentSyncIdx = 0;
  renderSyncList();
  setTab('sync', true);
  showToast('스페이스바로 타임스탬프 기록!');
}

function renderSyncList() {
  const ul = document.getElementById('syncList');
  ul.innerHTML = '';
  syncLines.forEach((l, i) => {
    const div = document.createElement('div');
    div.className = 'sync-line' + (l.ts !== null ? ' synced' : '') + (i === currentSyncIdx ? ' current' : '');
    div.id = 'sl-' + i;
    div.innerHTML = `
      <span class="sync-ts">${l.ts !== null ? fmtTime(l.ts) : '--:--'}</span>
      <span class="sync-text">${escHtml(l.text) || '<span style="color:var(--text-dim);font-style:italic;">빈 줄</span>'}</span>
      <button class="sync-clear-btn" onclick="clearTs(${i})">✕</button>`;
    div.addEventListener('click', (e) => { if (!e.target.classList.contains('sync-clear-btn')) { currentSyncIdx = i; renderSyncList(); } });
    ul.appendChild(div);
  });
  updateSyncProgress();
  scrollToCurrentSync();
}

function scrollToCurrentSync() {
  const el = document.getElementById('sl-' + currentSyncIdx);
  if (el) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

function stampCurrent() {
  if (syncLines.length === 0) return;
  const t = playerReady ? (player.getCurrentTime() || 0) : 0;
  syncLines[currentSyncIdx].ts = Math.round(t * 10) / 10;
  if (currentSyncIdx < syncLines.length - 1) currentSyncIdx++;
  renderSyncList();
}

function undoLast() {
  const prev = currentSyncIdx > 0 ? currentSyncIdx - 1 : 0;
  syncLines[prev].ts = null;
  currentSyncIdx = prev;
  renderSyncList();
  showToast('↩ 되돌렸습니다');
}

function clearTs(i) {
  syncLines[i].ts = null;
  renderSyncList();
}

function resetSync() {
  syncLines.forEach(l => l.ts = null);
  currentSyncIdx = 0;
  renderSyncList();
  showToast('리셋됨');
}

function updateSyncProgress() {
  const done = syncLines.filter(l => l.ts !== null).length;
  document.getElementById('syncProgressText').textContent = `${done} / ${syncLines.length} 라인 완료`;
}

// ── SAVE ──
function saveSong() {
  const done = syncLines.filter(l => l.ts !== null).length;
  if (done === 0) { showToast('타임스탬프가 없어요!'); return; }
  const url = document.getElementById('urlInput').value.trim();
  const title = prompt('곡 제목을 입력하세요:', '');
  if (!title) return;
  songs.push({ title, url, lines: JSON.parse(JSON.stringify(syncLines)) });
  saveSongs();
  renderLibrary();
  showToast(`"${title}" 저장됨!`);
}

// ── LIBRARY ──
function renderLibrary() {
  const ul = document.getElementById('songList');
  if (songs.length === 0) {
    ul.innerHTML = '<div class="empty-msg">저장된 곡이 없어요<br>싱크 에디터에서 저장하세요</div>';
    return;
  }
  ul.innerHTML = '';
  songs.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'song-item' + (i === currentSongIdx ? ' active' : '');
    div.innerHTML = `
      <div class="song-num">${String(i+1).padStart(2,'0')}</div>
      <div class="song-info">
        <div class="song-title">${escHtml(s.title)}</div>
        <div class="song-lines">${s.lines.length} 라인</div>
      </div>
      <button class="song-del" onclick="deleteSong(event,${i})">✕</button>`;
    div.addEventListener('click', (e) => { if (!e.target.classList.contains('song-del')) playSong(i); });
    ul.appendChild(div);
  });
}

function deleteSong(e, i) {
  e.stopPropagation();
  if (!confirm(`"${songs[i].title}" 삭제할까요?`)) return;
  songs.splice(i, 1);
  if (currentSongIdx === i) currentSongIdx = -1;
  else if (currentSongIdx > i) currentSongIdx--;
  saveSongs();
  renderLibrary();
}

function playSong(i) {
  currentSongIdx = i;
  const s = songs[i];
  document.getElementById('urlInput').value = s.url;
  const id = extractVideoId(s.url);
  if (id && playerReady) player.loadVideoById(id);
  renderLibrary();
  buildPlayLyrics();
  setTab('play', true);
  showToast(`▶ ${s.title}`);
}

function prevSong() {
  if (songs.length === 0) return;
  const idx = currentSongIdx > 0 ? currentSongIdx - 1 : songs.length - 1;
  playSong(idx);
}
function nextSong() {
  if (songs.length === 0) return;
  const idx = (currentSongIdx + 1) % songs.length;
  playSong(idx);
}

// ── PLAY LYRICS ──
function buildPlayLyrics() {
  const container = document.getElementById('playLyrics');
  container.innerHTML = '';
  playLyricEls = [];
  if (currentSongIdx < 0) return;
  const s = songs[currentSongIdx];
  document.getElementById('playNowTitle').textContent = s.title;
  document.getElementById('playEmpty').style.display = 'none';
  s.lines.forEach((l, i) => {
    const div = document.createElement('div');
    div.className = 'play-lyric-line';
    div.textContent = l.text || '';
    container.appendChild(div);
    playLyricEls.push(div);
  });
}

function updatePlayLyrics(t) {
  if (currentSongIdx < 0) return;
  const lines = songs[currentSongIdx].lines;
  let active = -1;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].ts !== null && lines[i].ts <= t) active = i;
  }
  playLyricEls.forEach((el, i) => {
    el.classList.remove('active', 'near');
    if (i === active) el.classList.add('active');
    else if (Math.abs(i - active) === 1) el.classList.add('near');
  });
  if (active >= 0 && playLyricEls[active]) {
    playLyricEls[active].scrollIntoView({ block: 'center', behavior: 'smooth' });
  }
}

// ── TABS ──
function setTab(tab, force) {
  if (tab === currentTab && !force) return;
  currentTab = tab;

  // 탭 버튼
  document.querySelectorAll('.mode-tab').forEach((b, i) => {
    b.classList.toggle('active', ['sync','play','library'][i] === tab);
  });

  // 패널
  const syncMode = document.getElementById('syncMode');
  const playMode = document.getElementById('playMode');
  const emptyState = document.getElementById('emptyState');
  const inputSection = document.getElementById('inputSection');
  const librarySection = document.getElementById('librarySection');

  syncMode.classList.remove('visible');
  playMode.classList.remove('visible');
  emptyState.style.display = 'none';
  inputSection.style.display = 'none';
  librarySection.style.display = 'none';
  playMode.querySelector('#playEmpty').style.display = 'none';

  if (tab === 'sync') {
    inputSection.style.display = 'flex';
    inputSection.style.flexDirection = 'column';
    inputSection.style.flex = '1';
    inputSection.style.overflow = 'hidden';
    if (syncLines.length > 0) syncMode.classList.add('visible');
    else emptyState.style.display = 'flex';
  } else if (tab === 'play') {
    inputSection.style.display = 'none';
    librarySection.style.display = 'flex';
    librarySection.style.flex = '1';
    playMode.classList.add('visible');
    if (currentSongIdx < 0) {
      document.getElementById('playEmpty').style.display = 'flex';
      playMode.querySelector('.play-content').style.display = 'none';
    } else {
      document.getElementById('playEmpty').style.display = 'none';
      playMode.querySelector('.play-content').style.display = 'flex';
    }
    renderLibrary();
  } else if (tab === 'library') {
    librarySection.style.display = 'flex';
    librarySection.style.flex = '1';
    emptyState.style.display = 'flex';
    renderLibrary();
  }
}

// ── KEYBOARD ──
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    if (currentTab === 'sync') stampCurrent();
    else togglePlay();
  }
  if (e.code === 'ArrowLeft') { if (playerReady) player.seekTo(Math.max(0, (player.getCurrentTime()||0)-3), true); }
  if (e.code === 'ArrowRight') { if (playerReady) player.seekTo((player.getCurrentTime()||0)+3, true); }
});

// ── UTILS ──
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──
setTab('sync');
renderLibrary();
</script>
</body>
</html>
