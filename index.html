<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOOTIFY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --ink: #0e0e0f;
  --ink2: #1a1a1e;
  --ink3: #242428;
  --line: rgba(255,255,255,.07);
  --muted: rgba(255,255,255,.25);
  --mid: rgba(255,255,255,.55);
  --text: rgba(255,255,255,.92);
  --gold: #e8c97a;
  --gold2: #f5dfa0;
  --red: #e85a4f;
  --r: 16px;
}

html, body { height: 100%; overflow: hidden; background: var(--ink); color: var(--text); font-family: 'DM Sans', sans-serif; }

/* ── NOISE OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: .025; pointer-events: none;
}

/* ── AMBIENT GLOW ── */
.glow {
  position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
  transition: opacity 1s ease;
}
.glow-a { width: 400px; height: 400px; background: rgba(232,201,122,.12); top: -100px; left: -100px; }
.glow-b { width: 300px; height: 300px; background: rgba(232,90,79,.07); bottom: 60px; right: -80px; }

/* ── LAYOUT ── */
#app {
  position: relative; z-index: 1;
  height: 100vh; display: flex; flex-direction: column;
  overflow: hidden;
}

/* ── TOP NAV ── */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.nav-logo {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 22px;
  letter-spacing: .5px;
  color: var(--gold);
}
.nav-tabs { display: flex; gap: 2px; background: var(--ink2); border-radius: 10px; padding: 3px; }
.tab-btn {
  border: none; background: transparent; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
  color: var(--muted); padding: 6px 14px; border-radius: 8px;
  transition: all .2s; letter-spacing: .3px;
}
.tab-btn.on { background: var(--ink3); color: var(--text); }

/* ── SCREENS ── */
.screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.screen.on { display: flex; }

/* ════════════════════════════════
   SYNC SCREEN
════════════════════════════════ */
#syncScreen { gap: 0; }

.sync-top {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
  display: flex; flex-direction: column; gap: 10px;
}

/* URL row */
.url-row { display: flex; gap: 8px; }
.url-in {
  flex: 1; background: var(--ink2); border: 1px solid var(--line);
  border-radius: 10px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  padding: 10px 14px; outline: none;
  transition: border-color .2s;
}
.url-in:focus { border-color: rgba(232,201,122,.4); }
.url-in::placeholder { color: var(--muted); }

.gbtn {
  border: none; cursor: pointer; border-radius: 10px;
  font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 12px;
  padding: 10px 16px; transition: all .15s; white-space: nowrap;
}
.gbtn-gold { background: var(--gold); color: #1a1208; }
.gbtn-gold:hover { background: var(--gold2); }
.gbtn-ghost { background: var(--ink3); color: var(--mid); border: 1px solid var(--line); }
.gbtn-ghost:hover { color: var(--text); }
.gbtn-red { background: transparent; color: var(--red); border: 1px solid rgba(232,90,79,.3); }
.gbtn-red:hover { background: var(--red); color: #fff; }

/* api badge */
.api-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--muted); letter-spacing: .3px;
}
.api-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted); transition: background .3s;
}
.api-dot.ready { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
.api-dot.err { background: var(--red); }

/* lyrics textarea */
.lyrics-wrap { flex: 1; display: flex; flex-direction: column; padding: 0 20px 12px; min-height: 0; overflow: hidden; }
.section-label {
  font-size: 10px; letter-spacing: 1.5px; color: var(--muted);
  text-transform: uppercase; padding: 12px 0 6px;
}
.lyrics-ta {
  flex: 1; background: var(--ink2); border: 1px solid var(--line);
  border-radius: 12px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 13px; line-height: 1.9;
  padding: 14px; resize: none; outline: none; min-height: 0;
  transition: border-color .2s;
}
.lyrics-ta:focus { border-color: rgba(232,201,122,.35); }
.lyrics-ta::placeholder { color: var(--muted); }
.start-btn {
  margin-top: 10px; width: 100%; padding: 14px;
  font-size: 13px; letter-spacing: .5px; border-radius: 12px;
}

/* ── SYNC EDITOR ── */
#syncEditor { display: none; flex-direction: column; flex: 1; overflow: hidden; }
#syncEditor.on { display: flex; }

.se-header {
  padding: 14px 20px 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--line);
}
.se-title { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 18px; color: var(--gold); }
.se-actions { display: flex; gap: 8px; }

/* player bar */
.player-bar {
  padding: 10px 20px; flex-shrink: 0;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--line);
}
.pbar-play {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--gold); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #1a1208; flex-shrink: 0;
  transition: background .15s;
}
.pbar-play:hover { background: var(--gold2); }
.pbar-time { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 36px; }
.pbar-track {
  flex: 1; height: 3px; background: var(--ink3); border-radius: 4px;
  cursor: pointer; position: relative;
}
.pbar-fill { height: 100%; background: var(--gold); border-radius: 4px; width: 0%; pointer-events: none; }

/* sync lines */
.se-lines { flex: 1; overflow-y: auto; padding: 8px 0; }
.se-lines::-webkit-scrollbar { display: none; }

.se-pair {
  padding: 8px 20px; border-left: 2px solid transparent;
  cursor: pointer; transition: all .15s;
}
.se-pair.current { border-left-color: var(--gold); background: rgba(232,201,122,.05); }
.se-pair.synced .se-ts { color: var(--gold); }
.se-ts {
  font-size: 10px; color: var(--muted); font-variant-numeric: tabular-nums;
  margin-bottom: 3px; letter-spacing: .5px;
}
.se-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; line-height: 1.6; }
.se-kr { font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--mid); line-height: 1.5; margin-top: 1px; }
.se-empty { font-size: 12px; color: var(--muted); font-style: italic; }

/* TAP button */
.tap-btn {
  margin: 0 20px 12px; flex-shrink: 0;
  background: var(--gold); color: #1a1208;
  border: none; border-radius: 14px; cursor: pointer;
  font-family: 'Instrument Serif', serif; font-style: italic;
  font-size: 28px; letter-spacing: 2px;
  padding: 16px; text-align: center;
  transition: transform .08s, background .1s;
  user-select: none; -webkit-user-select: none;
}
.tap-btn:active { transform: scale(.97); background: var(--gold2); }

.se-footer {
  padding: 8px 20px 14px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--line);
}
.se-prog { font-size: 11px; color: var(--muted); }

/* ════════════════════════════════
   PLAY SCREEN
════════════════════════════════ */
#playScreen { position: relative; }

.play-ambient {
  position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse at 50% 40%, rgba(232,201,122,.06) 0%, transparent 65%);
}

.play-lyrics-area {
  flex: 1; overflow: hidden; position: relative; z-index: 1;
  display: flex; flex-direction: column;
}

.play-scroll {
  flex: 1; overflow-y: auto; scroll-behavior: smooth;
  padding: 0 28px;
}
.play-scroll::-webkit-scrollbar { display: none; }

.play-spacer-top { height: 38vh; }
.play-spacer-bot { height: 38vh; }

.pl-pair {
  text-align: center; padding: 10px 0;
  transition: all .4s cubic-bezier(.4,0,.2,1);
}
.pl-jp {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px; font-weight: 300;
  color: rgba(255,255,255,.2);
  line-height: 1.6;
  transition: all .4s cubic-bezier(.4,0,.2,1);
}
.pl-kr {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; font-weight: 300;
  color: rgba(255,255,255,.12);
  line-height: 1.5; margin-top: 3px;
  transition: all .4s cubic-bezier(.4,0,.2,1);
}

.pl-pair.near .pl-jp { color: rgba(255,255,255,.45); font-size: 17px; }
.pl-pair.near .pl-kr { color: rgba(255,255,255,.28); }

.pl-pair.active .pl-jp {
  color: var(--gold2);
  font-size: 20px; font-weight: 700;
  text-shadow: 0 0 40px rgba(232,201,122,.5);
}
.pl-pair.active .pl-kr {
  color: rgba(255,255,255,.65);
  font-size: 14px;
}

/* play controls */
.play-ctrl {
  flex-shrink: 0; z-index: 1; position: relative;
  padding: 14px 24px 20px;
  border-top: 1px solid var(--line);
  background: linear-gradient(to top, var(--ink) 60%, transparent);
}
.play-song-title {
  font-family: 'Instrument Serif', serif; font-style: italic;
  font-size: 15px; color: var(--gold); text-align: center;
  margin-bottom: 12px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.play-prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.play-t { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 34px; }
.play-t.right { text-align: right; }
.play-track { flex: 1; height: 3px; background: var(--ink3); border-radius: 4px; cursor: pointer; }
.play-fill { height: 100%; background: var(--gold); border-radius: 4px; width: 0%; pointer-events: none; transition: width .1s linear; }
.play-btns { display: flex; align-items: center; justify-content: center; gap: 20px; }
.pbtn { background: transparent; border: none; cursor: pointer; color: var(--muted); font-size: 22px; transition: color .15s; padding: 6px; }
.pbtn:hover { color: var(--text); }
.pbtn-main {
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--gold); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: #1a1208;
  transition: background .15s, transform .1s;
  box-shadow: 0 4px 20px rgba(232,201,122,.3);
}
.pbtn-main:hover { background: var(--gold2); transform: scale(1.05); }

/* ════════════════════════════════
   LIBRARY SCREEN
════════════════════════════════ */
#libScreen { padding: 0; }

.lib-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.lib-list::-webkit-scrollbar { display: none; }

.lib-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 20px; cursor: pointer;
  border-bottom: 1px solid var(--line);
  transition: background .15s;
}
.lib-item:hover { background: var(--ink2); }
.lib-item.active { background: rgba(232,201,122,.07); }

.lib-num {
  font-size: 11px; color: var(--muted);
  font-variant-numeric: tabular-nums; min-width: 20px;
  font-family: 'DM Sans', sans-serif;
}
.lib-info { flex: 1; min-width: 0; }
.lib-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lib-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.lib-del {
  background: transparent; border: none; cursor: pointer;
  color: var(--muted); font-size: 18px; padding: 4px 6px;
  border-radius: 6px; transition: color .15s; line-height: 1;
}
.lib-del:hover { color: var(--red); }

.lib-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
}
.lib-empty-icon { font-size: 40px; opacity: .2; }
.lib-empty-text { font-size: 12px; color: var(--muted); letter-spacing: .5px; }

/* play empty */
.play-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px; z-index: 1;
}
.play-empty-icon { font-size: 48px; opacity: .15; }
.play-empty-text { font-size: 12px; color: var(--muted); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--ink3); border: 1px solid var(--line);
  color: var(--text); font-size: 12px; font-weight: 500;
  padding: 10px 20px; border-radius: 20px;
  transition: transform .3s cubic-bezier(.4,0,.2,1), opacity .3s;
  z-index: 999; white-space: nowrap; pointer-events: none;
  backdrop-filter: blur(10px);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* hidden yt */
#yt { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; }
</style>
</head>
<body>

<div class="glow glow-a"></div>
<div class="glow glow-b"></div>
<div id="yt"></div>

<div id="app">
  <nav>
    <div class="nav-logo">Sootify</div>
    <div class="nav-tabs">
      <button class="tab-btn on" data-tab="sync">Sync</button>
      <button class="tab-btn" data-tab="play">Play</button>
      <button class="tab-btn" data-tab="lib">Library</button>
    </div>
  </nav>

  <!-- ── SYNC SCREEN ── -->
  <div class="screen on" id="syncScreen">

    <!-- INPUT VIEW -->
    <div id="syncInput" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
      <div class="sync-top">
        <div class="url-row">
          <input class="url-in" id="urlIn" placeholder="YouTube URL 붙여넣기">
          <button class="gbtn gbtn-gold" id="loadBtn" onclick="loadVideo()">LOAD</button>
        </div>
        <div class="api-badge">
          <div class="api-dot" id="apiDot"></div>
          <span id="apiStatus">연결 중...</span>
        </div>
      </div>

      <div class="lyrics-wrap">
        <div class="section-label">가사 (일본어↵한국어↵↵일본어↵한국어)</div>
        <textarea class="lyrics-ta" id="lyricsIn" placeholder="神戸　中央区　元町。　駅前&#10;고베 주오구 모토마치. 역 앞&#10;&#10;今日から　ドキドキ　ニーハオハンユー　講座&#10;오늘부터 두근두근 니하오 중국어 강좌"></textarea>
        <button class="gbtn gbtn-gold start-btn" onclick="startSync()">싱크 시작 →</button>
      </div>
    </div>

    <!-- EDITOR VIEW -->
    <div id="syncEditor">
      <div class="se-header">
        <div class="se-title" id="seTitle">Editor</div>
        <div class="se-actions">
          <button class="gbtn gbtn-ghost" style="font-size:11px;padding:7px 12px;" onclick="backToInput()">← 뒤로</button>
          <button class="gbtn gbtn-ghost" style="font-size:11px;padding:7px 12px;" onclick="resetSync()">리셋</button>
          <button class="gbtn gbtn-gold" style="font-size:11px;padding:7px 12px;" onclick="saveSong()">저장</button>
        </div>
      </div>

      <div class="player-bar">
        <button class="pbar-play" id="sePlayBtn" onclick="togglePlay()">▶</button>
        <div class="pbar-time" id="seTime">0:00</div>
        <div class="pbar-track" id="seTrack">
          <div class="pbar-fill" id="seFill"></div>
        </div>
        <div class="pbar-time" id="seDur">0:00</div>
      </div>

      <div class="se-lines" id="seLines"></div>

      <button class="tap-btn" id="tapBtn" onclick="stampCurrent()">tap</button>

      <div class="se-footer">
        <div class="se-prog" id="seProg">0 / 0 완료</div>
        <button class="gbtn gbtn-ghost" style="font-size:11px;padding:6px 12px;" onclick="undoLast()">↩ undo</button>
      </div>
    </div>

  </div>

  <!-- ── PLAY SCREEN ── -->
  <div class="screen" id="playScreen">
    <div class="play-ambient"></div>

    <div class="play-empty" id="playEmpty">
      <div class="play-empty-icon">♪</div>
      <div class="play-empty-text">Library에서 곡을 선택하세요</div>
    </div>

    <div class="play-lyrics-area" id="playLyricsArea" style="display:none;">
      <div class="play-scroll" id="playScroll">
        <div class="play-spacer-top"></div>
        <div id="playLines"></div>
        <div class="play-spacer-bot"></div>
      </div>
    </div>

    <div class="play-ctrl" id="playCtrl" style="display:none;">
      <div class="play-song-title" id="playSongTitle">—</div>
      <div class="play-prog-row">
        <div class="play-t" id="playTCur">0:00</div>
        <div class="play-track" id="playTrack">
          <div class="play-fill" id="playFill"></div>
        </div>
        <div class="play-t right" id="playTDur">0:00</div>
      </div>
      <div class="play-btns">
        <button class="pbtn" onclick="prevSong()">⏮</button>
        <button class="pbtn-main" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="pbtn" onclick="nextSong()">⏭</button>
      </div>
    </div>
  </div>

  <!-- ── LIBRARY SCREEN ── -->
  <div class="screen" id="libScreen">
    <div class="lib-list" id="libList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ══ STATE ══
let player = null, playerReady = false, isPlaying = false;
let syncPairs = [];    // [{jp,kr,ts}]
let curIdx = 0;
let songs = [];        // [{title,url,pairs}]
let curSong = -1;
let playEls = [];
let rafId = null;

// ══ STORAGE ══
function loadData() { try { songs = JSON.parse(localStorage.getItem('sootify_v2') || '[]'); } catch { songs = []; } }
function saveData() { localStorage.setItem('sootify_v2', JSON.stringify(songs)); }
loadData();

// ══ YOUTUBE ══
function onYouTubeIframeAPIReady() {
  setApiStatus('connecting');
  player = new YT.Player('yt', {
    height: '1', width: '1',
    playerVars: { controls: 0, autoplay: 0, playsinline: 1 },
    events: {
      onReady: () => { playerReady = true; setApiStatus('ready'); },
      onError: () => setApiStatus('err'),
      onStateChange: e => {
        isPlaying = e.data === YT.PlayerState.PLAYING;
        updatePlayBtns();
        isPlaying ? startRAF() : stopRAF();
      }
    }
  });
}

function setApiStatus(s) {
  const dot = document.getElementById('apiDot');
  const txt = document.getElementById('apiStatus');
  const btn = document.getElementById('loadBtn');
  if (s === 'connecting') { dot.className = 'api-dot'; txt.textContent = '연결 중...'; btn.style.opacity = '.5'; }
  if (s === 'ready')      { dot.className = 'api-dot ready'; txt.textContent = '준비됨'; btn.style.opacity = '1'; }
  if (s === 'err')        { dot.className = 'api-dot err'; txt.textContent = '연결 실패'; }
}

function loadVideo() {
  const url = document.getElementById('urlIn').value.trim();
  const id = getVideoId(url);
  if (!id) { toast('유효한 YouTube URL을 넣어줘'); return; }
  if (!playerReady) {
    toast('API 초기화 중... 재시도 중');
    let tries = 0;
    const t = setInterval(() => {
      if (++tries > 12) { clearInterval(t); toast('연결 실패 — 새로고침 해봐'); return; }
      if (playerReady) { clearInterval(t); doLoad(id); }
    }, 500);
    return;
  }
  doLoad(id);
}
function doLoad(id) { player.loadVideoById(id); player.pauseVideo(); toast('✓ 로드됨'); }
function getVideoId(url) { const m = url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/); return m ? m[1] : null; }

function togglePlay() {
  if (!playerReady) { toast('URL을 먼저 로드해줘'); return; }
  isPlaying ? player.pauseVideo() : player.playVideo();
}
function updatePlayBtns() {
  document.getElementById('sePlayBtn').textContent = isPlaying ? '⏸' : '▶';
  document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
}

// ══ SEEK ══
document.getElementById('seTrack').addEventListener('click', function(e) { seek(e, this); });
document.getElementById('playTrack').addEventListener('click', function(e) { seek(e, this); });
function seek(e, el) {
  if (!playerReady) return;
  const r = el.getBoundingClientRect();
  player.seekTo(((e.clientX - r.left) / r.width) * (player.getDuration() || 0), true);
}

// ══ RAF ══
function startRAF() { stopRAF(); function f() { tick(); rafId = requestAnimationFrame(f); } rafId = requestAnimationFrame(f); }
function stopRAF() { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }

function tick() {
  if (!playerReady || !player.getCurrentTime) return;
  const t = player.getCurrentTime() || 0;
  const d = player.getDuration() || 1;
  const pct = (t / d * 100).toFixed(2) + '%';

  document.getElementById('seFill').style.width = pct;
  document.getElementById('seTime').textContent = fmt(t);
  document.getElementById('seDur').textContent = fmt(d);
  document.getElementById('playFill').style.width = pct;
  document.getElementById('playTCur').textContent = fmt(t);
  document.getElementById('playTDur').textContent = fmt(d);

  if (curSong >= 0) updatePlayLyrics(t);
}

function fmt(s) { s = Math.floor(s); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

// ══ PARSE LYRICS ══
function parseLyrics(raw) {
  const lines = raw.split('\n');
  const pairs = [];
  let i = 0;
  while (i < lines.length) {
    // 빈 줄 스킵
    while (i < lines.length && !lines[i].trim()) i++;
    if (i >= lines.length) break;
    const jp = lines[i].trim(); i++;
    const kr = (i < lines.length && lines[i].trim() && !looksJapanese(lines[i].trim())) ? lines[i].trim() : '';
    if (kr) i++;
    pairs.push({ jp, kr, ts: null });
  }
  return pairs;
}

function looksJapanese(s) {
  return /[\u3040-\u30ff\u4e00-\u9fff]/.test(s);
}

// ══ SYNC ══
function startSync() {
  const raw = document.getElementById('lyricsIn').value.trim();
  if (!raw) { toast('가사를 넣어줘'); return; }
  if (!getVideoId(document.getElementById('urlIn').value.trim())) { toast('URL을 먼저 로드해줘'); return; }
  syncPairs = parseLyrics(raw);
  curIdx = 0;
  renderEditor();
  document.getElementById('syncInput').style.display = 'none';
  document.getElementById('syncEditor').classList.add('on');
  toast('tap으로 타임스탬프 기록!');
}

function backToInput() {
  document.getElementById('syncEditor').classList.remove('on');
  document.getElementById('syncInput').style.display = 'flex';
  document.getElementById('syncInput').style.flexDirection = 'column';
  document.getElementById('syncInput').style.flex = '1';
  document.getElementById('syncInput').style.overflow = 'hidden';
}

function renderEditor() {
  const el = document.getElementById('seLines');
  el.innerHTML = '';
  syncPairs.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'se-pair' + (p.ts !== null ? ' synced' : '') + (i === curIdx ? ' current' : '');
    div.id = 'sp-' + i;
    div.innerHTML = `
      <div class="se-ts">${p.ts !== null ? fmt(p.ts) : '—:——'}</div>
      <div class="se-jp">${esc(p.jp) || '<span class="se-empty">빈 줄</span>'}</div>
      ${p.kr ? `<div class="se-kr">${esc(p.kr)}</div>` : ''}`;
    div.addEventListener('click', () => { curIdx = i; renderEditor(); });
    el.appendChild(div);
  });
  updateSeProg();
  scrollToCur();
}

function scrollToCur() {
  const el = document.getElementById('sp-' + curIdx);
  if (el) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

function stampCurrent() {
  if (!syncPairs.length) return;
  syncPairs[curIdx].ts = Math.round((playerReady ? player.getCurrentTime() : 0) * 10) / 10;
  if (curIdx < syncPairs.length - 1) curIdx++;
  renderEditor();
  // 햅틱 (지원 기기)
  if (navigator.vibrate) navigator.vibrate(20);
}

function undoLast() {
  const prev = Math.max(0, curIdx - 1);
  syncPairs[prev].ts = null;
  curIdx = prev;
  renderEditor();
  toast('↩ 되돌렸어');
}

function resetSync() {
  syncPairs.forEach(p => p.ts = null);
  curIdx = 0;
  renderEditor();
  toast('리셋됨');
}

function updateSeProg() {
  const done = syncPairs.filter(p => p.ts !== null).length;
  document.getElementById('seProg').textContent = `${done} / ${syncPairs.length} 완료`;
}

// ══ SAVE ══
function saveSong() {
  if (!syncPairs.filter(p => p.ts !== null).length) { toast('타임스탬프가 없어!'); return; }
  const title = prompt('곡 제목:', '') || '제목 없음';
  const url = document.getElementById('urlIn').value.trim();
  songs.push({ title, url, pairs: JSON.parse(JSON.stringify(syncPairs)) });
  saveData();
  renderLibrary();
  toast(`"${title}" 저장됨 ✓`);
}

// ══ LIBRARY ══
function renderLibrary() {
  const el = document.getElementById('libList');
  if (!songs.length) {
    el.innerHTML = `<div class="lib-empty"><div class="lib-empty-icon">🎵</div><div class="lib-empty-text">저장된 곡이 없어요</div></div>`;
    return;
  }
  el.innerHTML = '';
  songs.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'lib-item' + (i === curSong ? ' active' : '');
    div.innerHTML = `
      <div class="lib-num">${String(i+1).padStart(2,'0')}</div>
      <div class="lib-info">
        <div class="lib-title">${esc(s.title)}</div>
        <div class="lib-sub">${s.pairs.length}개 라인</div>
      </div>
      <button class="lib-del" onclick="deleteSong(event,${i})">✕</button>`;
    div.addEventListener('click', e => { if (!e.target.classList.contains('lib-del')) playSong(i); });
    el.appendChild(div);
  });
}

function deleteSong(e, i) {
  e.stopPropagation();
  if (!confirm(`"${songs[i].title}" 삭제?`)) return;
  songs.splice(i, 1);
  if (curSong === i) curSong = -1;
  else if (curSong > i) curSong--;
  saveData(); renderLibrary(); renderPlayScreen();
}

// ══ PLAY ══
function playSong(i) {
  curSong = i;
  const s = songs[i];
  document.getElementById('urlIn').value = s.url;
  const id = getVideoId(s.url);
  if (id && playerReady) { player.loadVideoById(id); player.playVideo(); }
  renderLibrary();
  renderPlayScreen();
  switchTab('play');
  toast(`▶ ${s.title}`);
}

function renderPlayScreen() {
  const empty = document.getElementById('playEmpty');
  const area = document.getElementById('playLyricsArea');
  const ctrl = document.getElementById('playCtrl');
  playEls = [];

  if (curSong < 0) {
    empty.style.display = 'flex'; area.style.display = 'none'; ctrl.style.display = 'none';
    return;
  }
  empty.style.display = 'none'; area.style.display = 'flex'; ctrl.style.display = 'block';

  const s = songs[curSong];
  document.getElementById('playSongTitle').textContent = s.title;
  const container = document.getElementById('playLines');
  container.innerHTML = '';
  s.pairs.forEach(p => {
    const div = document.createElement('div');
    div.className = 'pl-pair';
    div.innerHTML = `<div class="pl-jp">${esc(p.jp)}</div>${p.kr ? `<div class="pl-kr">${esc(p.kr)}</div>` : ''}`;
    container.appendChild(div);
    playEls.push(div);
  });
}

function updatePlayLyrics(t) {
  const pairs = songs[curSong].pairs;
  let active = -1;
  for (let i = 0; i < pairs.length; i++) {
    if (pairs[i].ts !== null && pairs[i].ts <= t) active = i;
  }
  playEls.forEach((el, i) => {
    el.classList.remove('active', 'near');
    if (i === active) el.classList.add('active');
    else if (Math.abs(i - active) <= 1) el.classList.add('near');
  });
  if (active >= 0 && playEls[active]) {
    playEls[active].scrollIntoView({ block: 'center', behavior: 'smooth' });
  }
}

function prevSong() { if (!songs.length) return; playSong((curSong - 1 + songs.length) % songs.length); }
function nextSong() { if (!songs.length) return; playSong((curSong + 1) % songs.length); }

// ══ TABS ══
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('on', b.dataset.tab === name));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  const map = { sync: 'syncScreen', play: 'playScreen', lib: 'libScreen' };
  document.getElementById(map[name]).classList.add('on');
  if (name === 'lib') renderLibrary();
}
document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

// ══ KEYBOARD ══
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); stampCurrent(); }
  if (e.code === 'ArrowLeft' && playerReady) player.seekTo(Math.max(0, (player.getCurrentTime()||0)-3), true);
  if (e.code === 'ArrowRight' && playerReady) player.seekTo((player.getCurrentTime()||0)+3, true);
});

// ══ UTILS ══
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ══ INIT ══
renderLibrary();
renderPlayScreen();
</script>
</body>
</html>
