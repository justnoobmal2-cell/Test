<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sootify</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#121212;color:#fff;font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased}
:root{--bg:#121212;--s1:#181818;--s2:#282828;--s3:#3e3e3e;--muted:#b3b3b3;--text:#fff;--green:#1db954;--green2:#1ed760;--nav-h:64px}

#app{position:fixed;inset:0;background:#121212}

/* ── SCREENS ── */
.screens{position:fixed;top:0;left:0;right:0;bottom:var(--nav-h);overflow:hidden}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;padding-bottom:88px}
.screen::-webkit-scrollbar{display:none}
.screen.on{display:block}

/* ── SHARED ── */
.sec-title{font-size:18px;font-weight:700;padding:0 16px 12px}
.btn{border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.btn:active{transform:scale(.97)}

/* ── HOME ── */
.home-top{padding:52px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.home-greeting{font-size:22px;font-weight:700}
.home-time{font-size:12px;color:var(--muted)}

.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px 24px}
.quick-item{
  background:var(--s2);border-radius:6px;height:56px;
  display:flex;align-items:center;gap:0;overflow:hidden;cursor:pointer;transition:background .15s
}
.quick-item:hover{background:var(--s3)}
.quick-item.playing .quick-title{color:var(--green)}
.quick-thumb{
  width:56px;height:56px;background:var(--s3);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px
}
.quick-title{font-size:12px;font-weight:700;padding:0 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.song-row{display:flex;align-items:center;gap:12px;padding:8px 16px;cursor:pointer;transition:background .1s}
.song-row:hover{background:rgba(255,255,255,.04)}
.song-row.playing .sr-title{color:var(--green)}
.sr-thumb{width:48px;height:48px;background:var(--s2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted)}
.sr-info{flex:1;min-width:0}
.sr-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-sub{font-size:12px;color:var(--muted);margin-top:2px}
.sr-more{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:20px;padding:4px 8px;line-height:1}

/* ── SEARCH ── */
.search-header{padding:52px 16px 12px;position:sticky;top:0;background:var(--bg);z-index:10}
.search-title{font-size:22px;font-weight:700;margin-bottom:14px}
.search-box{background:#fff;border-radius:6px;padding:0 14px;display:flex;align-items:center;gap:10px;height:46px}
.search-icon{color:#121212;flex-shrink:0}
.search-in{flex:1;background:transparent;border:none;outline:none;font-family:'Noto Sans KR',sans-serif;font-size:15px;color:#121212;font-weight:500}
.search-in::placeholder{color:#777}
.search-clear{background:transparent;border:none;cursor:pointer;color:#555;font-size:18px;padding:2px;display:none}

.url-section{padding:12px 16px 0}
.url-label{font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.3px}
.url-row{display:flex;gap:8px}
.url-in{flex:1;background:var(--s2);border:none;border-radius:6px;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:10px 12px;outline:none}
.url-in::placeholder{color:var(--muted)}
.url-btn{background:var(--green);color:#000;border:none;border-radius:6px;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:12px;padding:0 16px;cursor:pointer;white-space:nowrap}
.url-btn:hover{background:var(--green2)}
.api-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:all .3s}
.dot.ready{background:var(--green);box-shadow:0 0 5px rgba(29,185,84,.5)}
.dot.err{background:#e84040}
.api-txt{font-size:11px;color:var(--muted)}

.search-results{padding:8px 0}
.search-empty-msg{text-align:center;color:var(--muted);font-size:13px;padding:40px 16px;line-height:1.8}

/* ── PLAYLIST ── */
.pl-hero{padding:56px 16px 20px;background:linear-gradient(180deg,#1a3a27 0%,var(--bg) 100%)}
.pl-icon{font-size:56px;margin-bottom:12px}
.pl-name{font-size:22px;font-weight:700}
.pl-meta{font-size:12px;color:var(--muted);margin-top:4px}
.pl-actions{display:flex;align-items:center;gap:16px;margin-top:20px}
.pl-play{width:52px;height:52px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;color:#000;transition:transform .1s}
.pl-play:hover{transform:scale(1.05);background:var(--green2)}
.pl-shuffle{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:26px;transition:color .15s}
.pl-shuffle:hover{color:#fff}
.pl-songs{padding:8px 0}
.pl-empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 16px;line-height:1.8}

/* ── UPLOAD ── */
.up-header{padding:52px 16px 20px}
.up-title{font-size:22px;font-weight:700}
.up-sub{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.6}
.up-card{margin:0 16px;background:var(--s1);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:14px}
.uf{background:var(--s2);border:none;border-radius:8px;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:12px 14px;outline:none;width:100%}
.uf::placeholder{color:var(--muted)}
.uf-ta{resize:none;line-height:1.85;min-height:180px}
.ubtn{border:none;cursor:pointer;border-radius:50px;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:14px;padding:14px;width:100%;transition:all .15s}
.ubtn-g{background:var(--green);color:#000}.ubtn-g:hover{background:var(--green2)}
.ubtn-s{background:var(--s2);color:var(--muted)}.ubtn-s:hover{color:#fff}

/* ── SYNC EDITOR OVERLAY ── */
#syncOverlay{position:fixed;inset:0;z-index:500;background:var(--bg);display:none;flex-direction:column}
#syncOverlay.on{display:flex}
.so-nav{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.so-back{background:transparent;border:none;cursor:pointer;font-size:26px;color:#fff;line-height:1;padding:2px}
.so-nav-title{flex:1;font-size:16px;font-weight:700}
.so-save{background:var(--green);color:#000;border:none;border-radius:20px;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:13px;padding:8px 20px;cursor:pointer}
.so-pbar{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.so-pplay{width:36px;height:36px;border-radius:50%;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:#000;flex-shrink:0}
.so-ptime{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
.so-track{flex:1;height:4px;background:var(--s3);border-radius:2px;cursor:pointer;overflow:hidden}
.so-fill{height:100%;background:var(--green);border-radius:2px;width:0%;pointer-events:none}
.so-list{flex:1;overflow-y:auto;padding:8px 0}
.so-list::-webkit-scrollbar{display:none}
.so-pair{display:flex;align-items:flex-start;gap:14px;padding:10px 16px;border-left:3px solid transparent;cursor:pointer;transition:all .15s}
.so-pair.current{border-left-color:var(--green);background:rgba(29,185,84,.05)}
.so-pair.synced .so-ts{color:var(--green)}
.so-ts{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:42px;padding-top:3px}
.so-jp{font-family:'Noto Sans JP',sans-serif;font-size:14px;line-height:1.6}
.so-kr{font-size:12px;color:var(--muted);line-height:1.5;margin-top:2px}
.tap-area{padding:12px 16px;flex-shrink:0}
.tap-btn{width:100%;padding:18px;border-radius:50px;background:var(--green);color:#000;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:18px;transition:all .1s;user-select:none;-webkit-user-select:none}
.tap-btn:active{transform:scale(.98);background:var(--green2)}
.so-foot{padding:8px 16px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.so-prog{font-size:11px;color:var(--muted)}
.undo-btn{background:var(--s2);border:none;border-radius:20px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:11px;color:var(--muted);padding:6px 14px}

/* ── MINI PLAYER ── */
#miniPlayer{position:fixed;left:8px;right:8px;bottom:calc(var(--nav-h) + 6px);z-index:99;display:none;background:var(--s2);border-radius:8px;overflow:hidden;cursor:pointer}
#miniPlayer.on{display:block}
.mini-inner{display:flex;align-items:center;gap:12px;padding:10px 12px}
.mini-thumb{width:40px;height:40px;background:var(--s3);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted)}
.mini-info{flex:1;min-width:0}
.mini-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-sub{font-size:11px;color:var(--muted);margin-top:1px}
.mini-btn{background:transparent;border:none;cursor:pointer;color:#fff;font-size:26px;padding:4px;line-height:1}
.mini-prog{height:2px;background:var(--s3)}
.mini-pfill{height:100%;background:var(--green);width:0%;transition:width .1s linear}

/* ── BOTTOM NAV ── */
#bottomNav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--s1);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:stretch;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;cursor:pointer;color:var(--muted);padding:8px 0;transition:color .15s}
.nav-btn.on{color:#fff}
.nav-btn svg{width:22px;height:22px;fill:currentColor}
.nav-lbl{font-size:10px;font-weight:600}

/* ── FULL PLAYER OVERLAY ── */
#playerOverlay{position:fixed;inset:0;z-index:400;background:var(--bg);display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
#playerOverlay.on{transform:translateY(0)}
.po-handle-wrap{padding:14px 0 0;display:flex;justify-content:center;flex-shrink:0}
.po-handle{width:36px;height:4px;background:var(--s3);border-radius:2px}
.po-top{display:flex;align-items:center;padding:10px 16px 0;flex-shrink:0}
.po-down{background:transparent;border:none;cursor:pointer;color:var(--muted);line-height:1;padding:4px}
.po-top-mid{flex:1;text-align:center}
.po-top-label{font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.po-top-song{font-size:13px;font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.po-lyrics{flex:1;overflow-y:auto;padding:0 32px;scroll-behavior:smooth}
.po-lyrics::-webkit-scrollbar{display:none}
.po-sp{height:32vh}
.po-line{text-align:center;padding:10px 0;transition:all .35s cubic-bezier(.4,0,.2,1)}
.po-jp{font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:300;color:rgba(255,255,255,.2);line-height:1.6;transition:all .35s cubic-bezier(.4,0,.2,1)}
.po-kr{font-size:12px;font-weight:300;color:rgba(255,255,255,.12);line-height:1.5;margin-top:3px;transition:all .35s cubic-bezier(.4,0,.2,1)}
.po-line.near .po-jp{color:rgba(255,255,255,.4);font-size:17px}
.po-line.near .po-kr{color:rgba(255,255,255,.25)}
.po-line.active .po-jp{color:#fff;font-size:22px;font-weight:700}
.po-line.active .po-kr{color:rgba(255,255,255,.7);font-size:14px}
.po-ctrl{padding:16px 24px 32px;flex-shrink:0}
.po-song{font-size:20px;font-weight:700}
.po-artist{font-size:14px;color:var(--muted);margin-top:2px;margin-bottom:20px}
.po-prog-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.po-t{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:36px}
.po-track{flex:1;height:4px;background:var(--s3);border-radius:2px;cursor:pointer}
.po-pfill{height:100%;background:#fff;border-radius:2px;width:0%;pointer-events:none;transition:width .1s linear}
.po-btns{display:flex;align-items:center;justify-content:space-between;padding:0 4px}
.po-btn{background:transparent;border:none;cursor:pointer;color:var(--muted);padding:6px;line-height:1;transition:color .15s}
.po-btn:hover{color:#fff}
.po-btn-main{width:60px;height:60px;border-radius:50%;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;color:#000;transition:transform .1s}
.po-btn-main:hover{transform:scale(1.05)}
.po-del-wrap{display:flex;justify-content:center;margin-top:14px}
.po-del{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:6px 14px;border-radius:20px;transition:color .15s}
.po-del:hover{color:#e84040}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav-h) + 60px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--s2);color:#fff;font-size:12px;font-weight:500;padding:10px 20px;border-radius:20px;z-index:999;pointer-events:none;opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

#yt{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px}
</style>
</head>
<body>
<div id="yt"></div>

<div id="app">

  <!-- ── SCREENS ── -->
  <div class="screens">

    <!-- HOME -->
    <div class="screen on" id="homeScreen">
      <div class="home-top">
        <div class="home-greeting" id="homeGreeting">안녕하세요 👋</div>
      </div>
      <div class="quick-grid" id="quickGrid"></div>
      <div class="sec-title">저장된 곡</div>
      <div id="homeSongs"></div>
    </div>

    <!-- SEARCH -->
    <div class="screen" id="searchScreen">
      <div class="search-header">
        <div class="search-title">검색</div>
        <div class="search-box">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-in" id="searchIn" placeholder="곡 제목으로 검색">
          <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
        </div>
        <div class="url-section" style="padding:12px 0 0">
          <div class="url-label">URL로 직접 재생</div>
          <div class="url-row">
            <input class="url-in" id="urlIn" placeholder="YouTube URL 붙여넣기">
            <button class="url-btn" id="urlPlayBtn" onclick="playFromUrl()">재생</button>
          </div>
          <div class="api-row">
            <div class="dot" id="apiDot"></div>
            <span class="api-txt" id="apiTxt">연결 중...</span>
          </div>
        </div>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <!-- PLAYLIST -->
    <div class="screen" id="playlistScreen">
      <div class="pl-hero">
        <div class="pl-icon">🎵</div>
        <div class="pl-name">내 플레이리스트</div>
        <div class="pl-meta" id="plMeta">0곡</div>
        <div class="pl-actions">
          <button class="pl-play" onclick="playAll()">▶</button>
          <button class="pl-shuffle" onclick="playShuffle()" title="셔플">⇄</button>
        </div>
      </div>
      <div class="pl-songs" id="plSongs"></div>
    </div>

    <!-- UPLOAD -->
    <div class="screen" id="uploadScreen">
      <div class="up-header">
        <div class="up-title">업로드</div>
        <div class="up-sub">YouTube URL과 가사를 넣고<br>싱크를 맞춰 저장하세요.</div>
      </div>
      <div class="up-card">
        <input class="uf" id="upUrl" placeholder="YouTube URL">
        <div class="api-row">
          <div class="dot" id="apiDot2"></div>
          <span class="api-txt" id="apiTxt2">연결 중...</span>
        </div>
        <textarea class="uf uf-ta" id="upLyrics" placeholder="가사 (일본어↵한국어↵↵일본어↵한국어...)"></textarea>
        <button class="ubtn ubtn-g" onclick="startSync()">싱크 시작 →</button>
      </div>
    </div>

  </div><!-- /screens -->

  <!-- ── SYNC EDITOR OVERLAY ── -->
  <div id="syncOverlay">
    <div class="so-nav">
      <button class="so-back" onclick="closeSyncEditor()">‹</button>
      <div class="so-nav-title">Sync Editor</div>
      <button class="so-save" onclick="saveSong()">저장</button>
    </div>
    <div class="so-pbar">
      <button class="so-pplay" id="soPlayBtn" onclick="togglePlay()">▶</button>
      <div class="so-ptime"><span id="soTime">0:00</span> / <span id="soDur">0:00</span></div>
      <div class="so-track" id="soTrack"><div class="so-fill" id="soFill"></div></div>
    </div>
    <div class="so-list" id="soList"></div>
    <div class="tap-area"><button class="tap-btn" onclick="stampCurrent()">tap</button></div>
    <div class="so-foot">
      <div class="so-prog" id="soProg">0 / 0 완료</div>
      <button class="undo-btn" onclick="undoLast()">↩ undo</button>
    </div>
  </div>

  <!-- ── MINI PLAYER ── -->
  <div id="miniPlayer" onclick="openPlayer()">
    <div class="mini-inner">
      <div class="mini-thumb">♪</div>
      <div class="mini-info">
        <div class="mini-title" id="miniTitle">—</div>
        <div class="mini-sub">Sootify</div>
      </div>
      <div class="mini-btns">
        <button class="mini-btn" id="miniPlayBtn" onclick="event.stopPropagation();togglePlay()">▶</button>
        <button class="mini-btn" onclick="event.stopPropagation();nextSong()" style="font-size:20px">⏭</button>
      </div>
    </div>
    <div class="mini-prog"><div class="mini-pfill" id="miniPFill"></div></div>
  </div>

  <!-- ── BOTTOM NAV ── -->
  <nav id="bottomNav">
    <button class="nav-btn on" data-tab="home">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span class="nav-lbl">홈</span>
    </button>
    <button class="nav-btn" data-tab="search">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.5 6.5 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span class="nav-lbl">검색</span>
    </button>
    <button class="nav-btn" data-tab="playlist">
      <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
      <span class="nav-lbl">플레이리스트</span>
    </button>
    <button class="nav-btn" data-tab="upload">
      <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
      <span class="nav-lbl">업로드</span>
    </button>
  </nav>

</div><!-- /app -->

<!-- ── FULL PLAYER OVERLAY ── -->
<div id="playerOverlay">
  <div class="po-handle-wrap"><div class="po-handle"></div></div>
  <div class="po-top">
    <button class="po-down" onclick="closePlayer()">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="var(--muted)"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
    </button>
    <div class="po-top-mid">
      <div class="po-top-label">재생 중</div>
      <div class="po-top-song" id="poTopSong">—</div>
    </div>
    <div style="width:34px"></div>
  </div>
  <div class="po-lyrics" id="poLyrics">
    <div class="po-sp"></div>
    <div id="poLines"></div>
    <div class="po-sp"></div>
  </div>
  <div class="po-ctrl">
    <div class="po-song" id="poSong">—</div>
    <div class="po-artist">Sootify</div>
    <div class="po-prog-row">
      <div class="po-t" id="poTCur">0:00</div>
      <div class="po-track" id="poTrack"><div class="po-pfill" id="poPFill"></div></div>
      <div class="po-t" style="text-align:right" id="poTDur">0:00</div>
    </div>
    <div class="po-btns">
      <button class="po-btn" onclick="prevSong()" style="font-size:28px">⏮</button>
      <button class="po-btn-main" id="poPlayBtn" onclick="togglePlay()">▶</button>
      <button class="po-btn" onclick="nextSong()" style="font-size:28px">⏭</button>
    </div>
    <div class="po-del-wrap">
      <button class="po-del" onclick="deleteCurSong()">라이브러리에서 삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ══ STATE ══
let player=null, playerReady=false, isPlaying=false;
let syncPairs=[], curIdx=0;
let songs=[], curSong=-1;
let poLines=[], rafId=null;
let currentTab='home';
let shuffleMode=false;

// ══ STORAGE ══
function loadData(){try{songs=JSON.parse(localStorage.getItem('sootify_v4')||'[]')}catch{songs=[]}}
function saveData(){localStorage.setItem('sootify_v4',JSON.stringify(songs))}
loadData();

// ══ TIME GREETING ══
function setGreeting(){
  const h=new Date().getHours();
  const g=h<12?'좋은 아침이에요 ☀':h<18?'안녕하세요 👋':'좋은 밤이에요 🌙';
  document.getElementById('homeGreeting').textContent=g;
}
setGreeting();

// ══ YOUTUBE API ══
function onYouTubeIframeAPIReady(){
  setApi('connecting');
  player=new YT.Player('yt',{height:'1',width:'1',
    playerVars:{controls:0,autoplay:0,playsinline:1},
    events:{
      onReady:()=>{playerReady=true;setApi('ready')},
      onError:()=>setApi('err'),
      onStateChange:e=>{
        isPlaying=e.data===YT.PlayerState.PLAYING;
        updateBtns();
        isPlaying?startRAF():stopRAF();
      }
    }
  });
}

function setApi(s){
  ['apiDot','apiDot2'].forEach(id=>{
    const d=document.getElementById(id);
    if(!d)return;
    d.className='dot'+(s==='ready'?' ready':s==='err'?' err':'');
  });
  ['apiTxt','apiTxt2'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.textContent=s==='ready'?'준비됨':s==='err'?'연결 실패':'연결 중...';
  });
  const lb=document.getElementById('urlPlayBtn');
  if(lb)lb.style.opacity=s==='ready'?'1':'.5';
}

// ══ VIDEO CONTROL ══
function getVid(url){
  const m=url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
  return m?m[1]:null;
}

function doLoad(id){
  player.loadVideoById(id);
  player.pauseVideo();
}

function playFromUrl(){
  const url=document.getElementById('urlIn').value.trim();
  const id=getVid(url);
  if(!id){toast('유효한 YouTube URL을 넣어줘');return}
  if(!playerReady){toast('API 연결 중... 잠깐만');return}
  // URL만으로 재생 (저장 안 함)
  curSong=-2; // -2 = temp play
  player.loadVideoById(id);
  player.playVideo();
  document.getElementById('miniTitle').textContent='임시 재생';
  document.getElementById('miniPlayer').classList.add('on');
  toast('▶ 재생 시작');
}

function togglePlay(){
  if(!playerReady){toast('URL을 먼저 로드해줘');return}
  isPlaying?player.pauseVideo():player.playVideo();
}

function updateBtns(){
  const ic=isPlaying?'⏸':'▶';
  ['soPlayBtn','miniPlayBtn','poPlayBtn'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.textContent=ic;
  });
}

// ══ SEEK ══
document.getElementById('soTrack').addEventListener('click',e=>doSeek(e,document.getElementById('soTrack')));
document.getElementById('poTrack').addEventListener('click',e=>doSeek(e,document.getElementById('poTrack')));
function doSeek(e,el){
  if(!playerReady)return;
  const r=el.getBoundingClientRect();
  player.seekTo(((e.clientX-r.left)/r.width)*(player.getDuration()||0),true);
}

// ══ RAF LOOP ══
function startRAF(){stopRAF();function f(){tick();rafId=requestAnimationFrame(f)}rafId=requestAnimationFrame(f)}
function stopRAF(){if(rafId){cancelAnimationFrame(rafId);rafId=null}}

function tick(){
  if(!playerReady||!player.getCurrentTime)return;
  const t=player.getCurrentTime()||0, d=player.getDuration()||1;
  const pct=(t/d*100).toFixed(2)+'%';
  // sync editor
  document.getElementById('soFill').style.width=pct;
  document.getElementById('soTime').textContent=fmt(t);
  document.getElementById('soDur').textContent=fmt(d);
  // mini
  document.getElementById('miniPFill').style.width=pct;
  // full player
  document.getElementById('poPFill').style.width=pct;
  document.getElementById('poTCur').textContent=fmt(t);
  document.getElementById('poTDur').textContent=fmt(d);
  // lyrics
  if(curSong>=0)updateLyrics(t);
}

function fmt(s){s=Math.floor(s);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`}

// ══ PARSE LYRICS ══
function parseLyrics(raw){
  const lines=raw.split('\n'), pairs=[];
  let i=0;
  while(i<lines.length){
    while(i<lines.length&&!lines[i].trim())i++;
    if(i>=lines.length)break;
    const jp=lines[i].trim();i++;
    const next=(lines[i]||'').trim();
    const kr=(next&&!isJP(next))?next:'';
    if(kr)i++;
    pairs.push({jp,kr,ts:null});
  }
  return pairs;
}
function isJP(s){return/[\u3040-\u30ff\u4e00-\u9fff]/.test(s)}

// ══ SYNC EDITOR ══
function startSync(){
  const url=document.getElementById('upUrl').value.trim();
  const raw=document.getElementById('upLyrics').value.trim();
  if(!url){toast('URL을 넣어줘');return}
  if(!raw){toast('가사를 넣어줘');return}
  const id=getVid(url);
  if(!id){toast('유효한 YouTube URL이 아니야');return}
  if(!playerReady){toast('API 연결 중... 잠깐만');return}
  syncPairs=parseLyrics(raw);
  if(!syncPairs.length){toast('가사 파싱 실패');return}
  curIdx=0;
  doLoad(id);
  renderSyncEditor();
  document.getElementById('syncOverlay').classList.add('on');
  toast('tap으로 타임스탬프 기록!');
}

function closeSyncEditor(){
  document.getElementById('syncOverlay').classList.remove('on');
  if(playerReady)player.pauseVideo();
}

function renderSyncEditor(){
  const el=document.getElementById('soList');el.innerHTML='';
  syncPairs.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='so-pair'+(p.ts!==null?' synced':'')+(i===curIdx?' current':'');
    d.id='sp'+i;
    d.innerHTML=`<div class="so-ts">${p.ts!==null?fmt(p.ts):'—:——'}</div>
      <div><div class="so-jp">${esc(p.jp)}</div>${p.kr?`<div class="so-kr">${esc(p.kr)}</div>`:''}</div>`;
    d.onclick=()=>{curIdx=i;renderSyncEditor()};
    el.appendChild(d);
  });
  const done=syncPairs.filter(p=>p.ts!==null).length;
  document.getElementById('soProg').textContent=`${done} / ${syncPairs.length} 완료`;
  const cur=document.getElementById('sp'+curIdx);
  if(cur)cur.scrollIntoView({block:'center',behavior:'smooth'});
}

function stampCurrent(){
  if(!syncPairs.length)return;
  syncPairs[curIdx].ts=Math.round((playerReady?player.getCurrentTime():0)*10)/10;
  if(curIdx<syncPairs.length-1)curIdx++;
  renderSyncEditor();
  if(navigator.vibrate)navigator.vibrate(18);
}

function undoLast(){
  const p=Math.max(0,curIdx-1);
  syncPairs[p].ts=null;curIdx=p;renderSyncEditor();toast('↩ 되돌렸어');
}

function saveSong(){
  if(!syncPairs.filter(p=>p.ts!==null).length){toast('타임스탬프가 없어!');return}
  const title=prompt('곡 제목:','')||'제목 없음';
  const url=document.getElementById('upUrl').value.trim();
  songs.push({title,url,pairs:JSON.parse(JSON.stringify(syncPairs))});
  saveData();
  renderAll();
  document.getElementById('syncOverlay').classList.remove('on');
  toast(`"${title}" 저장됨 ✓`);
}

// ══ PLAY ══
function playSong(i){
  if(i<0||i>=songs.length)return;
  curSong=i;
  const s=songs[i];
  const id=getVid(s.url);
  if(id&&playerReady){player.loadVideoById(id);player.playVideo()}
  document.getElementById('urlIn').value=s.url;
  document.getElementById('miniTitle').textContent=s.title;
  document.getElementById('miniPlayer').classList.add('on');
  document.getElementById('poSong').textContent=s.title;
  document.getElementById('poTopSong').textContent=s.title;
  buildPoLines();
  renderAll();
}

function buildPoLines(){
  const cont=document.getElementById('poLines');cont.innerHTML='';poLines=[];
  if(curSong<0)return;
  songs[curSong].pairs.forEach(p=>{
    const d=document.createElement('div');d.className='po-line';
    d.innerHTML=`<div class="po-jp">${esc(p.jp)}</div>${p.kr?`<div class="po-kr">${esc(p.kr)}</div>`:''}`;
    cont.appendChild(d);poLines.push(d);
  });
}

function updateLyrics(t){
  if(curSong<0||!songs[curSong])return;
  const pairs=songs[curSong].pairs;let active=-1;
  for(let i=0;i<pairs.length;i++)if(pairs[i].ts!==null&&pairs[i].ts<=t)active=i;
  poLines.forEach((el,i)=>{
    el.classList.remove('active','near');
    if(i===active)el.classList.add('active');
    else if(Math.abs(i-active)<=1)el.classList.add('near');
  });
  if(active>=0&&poLines[active])poLines[active].scrollIntoView({block:'center',behavior:'smooth'});
}

function prevSong(){
  if(!songs.length)return;
  playSong((curSong-1+songs.length)%songs.length);
}
function nextSong(){
  if(!songs.length)return;
  if(shuffleMode)playSong(Math.floor(Math.random()*songs.length));
  else playSong((curSong+1)%songs.length);
}
function playAll(){if(songs.length)playSong(0)}
function playShuffle(){shuffleMode=!shuffleMode;if(songs.length)playSong(Math.floor(Math.random()*songs.length));toast(shuffleMode?'셔플 켜짐 🔀':'셔플 꺼짐')}

function deleteCurSong(){
  if(curSong<0||curSong>=songs.length)return;
  if(!confirm(`"${songs[curSong].title}" 삭제?`))return;
  songs.splice(curSong,1);
  saveData();
  curSong=-1;
  document.getElementById('miniPlayer').classList.remove('on');
  closePlayer();
  if(playerReady)player.pauseVideo();
  renderAll();
  toast('삭제됨');
}

// ══ FULL PLAYER ══
function openPlayer(){document.getElementById('playerOverlay').classList.add('on')}
function closePlayer(){document.getElementById('playerOverlay').classList.remove('on')}

// ══ RENDER ══
function renderAll(){
  renderHome();renderSearch('');renderPlaylist();
}

function songRowHTML(s,i){
  return `<div class="song-row${i===curSong?' playing':''}" onclick="playSong(${i})">
    <div class="sr-thumb">♪</div>
    <div class="sr-info">
      <div class="sr-title">${esc(s.title)}</div>
      <div class="sr-sub">${s.pairs.length}개 라인</div>
    </div>
    <button class="sr-more" onclick="event.stopPropagation();delSong(${i})">···</button>
  </div>`;
}

function delSong(i){
  if(!confirm(`"${songs[i].title}" 삭제?`))return;
  songs.splice(i,1);
  if(curSong===i){curSong=-1;document.getElementById('miniPlayer').classList.remove('on');if(playerReady)player.pauseVideo()}
  else if(curSong>i)curSong--;
  saveData();renderAll();
}

function renderHome(){
  // quick grid (최대 6곡)
  const qg=document.getElementById('quickGrid');
  if(!songs.length){qg.innerHTML='';document.getElementById('homeSongs').innerHTML='<div style="text-align:center;color:var(--muted);font-size:13px;padding:32px 16px">업로드 탭에서 첫 곡을 추가해봐요</div>';return}
  qg.innerHTML=songs.slice(0,6).map((s,i)=>`
    <div class="quick-item${i===curSong?' playing':''}" onclick="playSong(${i})">
      <div class="quick-thumb">♪</div>
      <div class="quick-title">${esc(s.title)}</div>
    </div>`).join('');
  document.getElementById('homeSongs').innerHTML=songs.map(songRowHTML).join('');
}

function renderSearch(q){
  const results=document.getElementById('searchResults');
  const filtered=q?songs.filter(s=>s.title.toLowerCase().includes(q.toLowerCase())):songs;
  if(!filtered.length){
    results.innerHTML=`<div class="search-empty-msg">${q?`"${esc(q)}" 검색 결과 없음`:'저장된 곡이 없어요<br>업로드 탭에서 추가해보세요'}</div>`;
    return;
  }
  results.innerHTML=filtered.map((s,fi)=>{
    const i=songs.indexOf(s);
    return songRowHTML(s,i);
  }).join('');
}

function renderPlaylist(){
  const meta=document.getElementById('plMeta');
  const cont=document.getElementById('plSongs');
  meta.textContent=`${songs.length}곡`;
  if(!songs.length){cont.innerHTML='<div class="pl-empty">업로드 탭에서 곡을 추가하면<br>여기서 볼 수 있어요</div>';return}
  cont.innerHTML=songs.map(songRowHTML).join('');
}

// ══ SEARCH INPUT ══
document.getElementById('searchIn').addEventListener('input',function(){
  const q=this.value;
  document.getElementById('searchClear').style.display=q?'block':'none';
  renderSearch(q);
});
function clearSearch(){
  document.getElementById('searchIn').value='';
  document.getElementById('searchClear').style.display='none';
  renderSearch('');
}

// ══ TABS ══
document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
function switchTab(name){
  currentTab=name;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('on',b.dataset.tab===name));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(name+'Screen').classList.add('on');
  if(name==='search')renderSearch(document.getElementById('searchIn').value);
  if(name==='playlist')renderPlaylist();
  if(name==='home')renderHome();
}

// ══ KEYBOARD ══
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();stampCurrent()}
  if(e.code==='ArrowLeft'&&playerReady)player.seekTo(Math.max(0,(player.getCurrentTime()||0)-3),true);
  if(e.code==='ArrowRight'&&playerReady)player.seekTo((player.getCurrentTime()||0)+3,true);
  if((e.ctrlKey||e.metaKey)&&e.code==='KeyZ'){e.preventDefault();undoLast()}
});

// ══ UTILS ══
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
let toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2200);
}

// ══ INIT ══
renderAll();
</script>
</body>
</html>
